<!DOCTYPE html>
<html lang="tr">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #00ff88;
      --cyan: #00d4ff;
      --yellow: #ffd600;
      --red: #ff4757;
      --dim: #4a5568;
      --text: #c8d6e5;
      --bg: #080c10;
    }
    
    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      padding: 20px;
      line-height: 1.6;
      min-height: 100vh;
      cursor: text;
      position: relative;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0,255,136,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #terminal {
      max-width: 1000px;
      margin: 30px auto;
      background: rgba(6,10,14,0.97);
      border-radius: 10px;
      box-shadow: 
        0 0 0 1px rgba(0,255,136,0.15),
        0 0 40px rgba(0,255,136,0.08),
        0 0 80px rgba(0,180,255,0.05),
        0 40px 80px rgba(0,0,0,0.6);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    body.theme-green { --green: #00ff88; --cyan: #00d4ff; --yellow: #ffd600; }
    body.theme-red   { --green: #ff4757; --cyan: #ff8585; --yellow: #ffb3b3; }
    body.theme-amber { --green: #ffb300; --cyan: #ffd740; --yellow: #ffe57f; }

    .terminal-header {
      background: linear-gradient(90deg, #0a0f14 0%, #111820 100%);
      padding: 13px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(0,255,136,0.12);
      position: relative;
      user-select: none;
    }

    .terminal-buttons {
      position: absolute;
      left: 16px;
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .terminal-button { 
      width: 13px; height: 13px; 
      border-radius: 50%;
      transition: all 0.2s;
      cursor: pointer;
    }
    .terminal-button:hover { transform: scale(1.15); }
    .btn-close    { background: #ff5f57; box-shadow: 0 0 8px rgba(255,95,87,0.5); }
    .btn-minimize { background: #ffbd2e; box-shadow: 0 0 8px rgba(255,189,46,0.5); }
    .btn-maximize { background: #28ca42; box-shadow: 0 0 8px rgba(40,202,66,0.5); }

    .terminal-title { 
      font-size: 12px; 
      color: var(--green);
      letter-spacing: 0.08em;
      font-weight: 400;
      opacity: 0.6;
    }

    .portfolio-btn {
      position: absolute;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      background: rgba(0,255,136,0.07);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 5px;
      color: var(--green);
      text-decoration: none;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
      opacity: 0.8;
    }
    .portfolio-btn:hover {
      background: rgba(0,255,136,0.15);
      border-color: rgba(0,255,136,0.4);
      opacity: 1;
    }

    .terminal-body { 
      padding: 28px 32px; 
      min-height: 520px; 
      max-height: 82vh; 
      overflow-y: auto;
    }

    .terminal-body::-webkit-scrollbar { width: 4px; }
    .terminal-body::-webkit-scrollbar-track { background: transparent; }
    .terminal-body::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.2); border-radius: 2px; }

    .prompt-user  { color: var(--green); font-weight: 500; }
    .prompt-at    { color: var(--dim); }
    .prompt-host  { color: var(--cyan); font-weight: 500; }
    .prompt-colon { color: var(--dim); }
    .prompt-path  { color: var(--yellow); }
    .prompt-dollar{ color: var(--dim); margin: 0 6px; }
    
    .command-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      width: 60%;
      caret-color: var(--green);
    }

    .output { 
      margin-bottom: 4px; 
      white-space: pre-wrap; 
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
      animation: fadeIn 0.15s ease-in;
    }

    .output-gap { margin-bottom: 16px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    .input-line { display: none; align-items: center; margin-top: 4px; }

    .c-green  { color: var(--green); }
    .c-cyan   { color: var(--cyan); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }
    .c-dim    { color: var(--dim); }
    .c-white  { color: #fff; }
    .c-text   { color: var(--text); }
    .bold     { font-weight: 700; }

    .boot-line {
      font-size: 13px;
      margin: 2px 0;
      opacity: 0;
      animation: fadeIn 0.2s ease-in forwards;
      color: var(--dim);
    }
    .boot-line .ok   { color: var(--green); font-weight: 700; }
    .boot-line .info { color: var(--cyan); }

    .ascii-banner {
      color: var(--green);
      font-size: 11px;
      line-height: 1.2;
      margin: 16px 0 4px 0;
      opacity: 0;
      animation: fadeIn 0.4s ease-in forwards;
      text-shadow: 0 0 20px rgba(0,255,136,0.4);
      white-space: pre;
    }

    .ascii-sub {
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 0.4s ease-in forwards;
    }

    .info-box {
      border-left: 2px solid var(--cyan);
      padding: 10px 16px;
      margin: 8px 0 4px 0;
      background: rgba(0,212,255,0.04);
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      line-height: 1.8;
    }

    .help-section-title {
      color: var(--yellow);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 14px 0 6px 0;
      font-weight: 700;
    }

    .help-row { display: flex; margin: 3px 0; font-size: 13px; }
    .help-cmd { color: var(--green); min-width: 200px; font-weight: 500; }
    .help-arrow { color: var(--dim); margin-right: 10px; }
    .help-desc  { color: var(--text); }

    .help-tip {
      margin-top: 14px;
      padding: 8px 12px;
      background: rgba(0,255,136,0.05);
      border-radius: 4px;
      font-size: 12px;
      color: var(--dim);
    }
    .help-tip span { color: var(--green); }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }

    .dir  { color: var(--cyan); font-weight: 500; margin-right: 18px; }
    .file { color: var(--dim);  margin-right: 18px; }

    @media (max-width: 768px) { 
      body { padding: 8px; }
      #terminal { margin: 8px auto; }
      .terminal-body { padding: 16px 18px; }
      .ascii-banner { font-size: 7px; }
      .portfolio-btn span:last-child { display: none; }
    }
  </style>
</head>

    function handleTab(e) {
      e.preventDefault();
      const val   = input.value.trim();
      const parts = val.split(' ');
      const word  = parts[parts.length - 1].toLowerCase();
      if (!word) return;

      let matches = [];
      if (parts.length === 1) {
        matches = COMMANDS.filter(c => c.startsWith(word));
      } else {
        const opts = [...fs[currentPath].dirs, ...fs[currentPath].files];
        matches = opts.filter(o => o.toLowerCase().startsWith(word));
      }

      if (matches.length === 1) {
        parts[parts.length - 1] = matches[0];
        input.value = parts.join(' ') + (parts.length === 1 ? ' ' : '');
      } else if (matches.length > 1) {
        printText(matches.join('   '));
        scrollToBottom();
      }
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Tab') { handleTab(e); return; }
      if (e.key === 'Enter') {
        const raw  = input.value.trim();
        const args = raw.split(' ');
        const cmd  = args[0].toLowerCase();
        const tgt  = args.slice(1).join(' ').trim().toLowerCase();
        if (raw) { cmdHistory.push(raw); historyIdx = cmdHistory.length; }
        printPromptLine(raw);
        executeCommand(cmd, tgt);
        input.value = '';
        scrollToBottom();
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIdx > 0) { historyIdx--; input.value = cmdHistory[historyIdx]; }
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIdx < cmdHistory.length - 1) { historyIdx++; input.value = cmdHistory[historyIdx]; }
        else { historyIdx = cmdHistory.length; input.value = ''; }
      }
    });

      switch (cmd) {
        case 'help':
          printHTML(`<div style="margin:4px 0">
  <div class="help-section-title">// HakkДұmda</div>
  <div class="help-row"><span class="help-cmd">whoami</span><span class="help-arrow">вҶ’</span><span class="help-desc">kim olduДҹumu Г¶Дҹren</span></div>
  <div class="help-row"><span class="help-cmd">cat hakkimda.txt</span><span class="help-arrow">вҶ’</span><span class="help-desc">hakkДұmda detaylДұ bilgi</span></div>
  <div class="help-row"><span class="help-cmd">cat iletisim.sh</span><span class="help-arrow">вҶ’</span><span class="help-desc">iletiЕҹim bilgilerim</span></div>

  <div class="help-section-title">// Deneyim & Yetkinlikler</div>
  <div class="help-row"><span class="help-cmd">cd deneyim</span><span class="help-arrow">вҶ’</span><span class="help-desc">iЕҹ deneyimlerim</span></div>
  <div class="help-row"><span class="help-cmd">cd yetkinlikler</span><span class="help-arrow">вҶ’</span><span class="help-desc">teknik stack</span></div>
  <div class="help-row"><span class="help-cmd">cd sertifikalar</span><span class="help-arrow">вҶ’</span><span class="help-desc">sertifikalarДұm & hedefler</span></div>
  <div class="help-row"><span class="help-cmd">cd egitim</span><span class="help-arrow">вҶ’</span><span class="help-desc">eДҹitim bilgilerim</span></div>
  <div class="help-row"><span class="help-cmd">cd projeler</span><span class="help-arrow">вҶ’</span><span class="help-desc">projelerim</span></div>

  <div class="help-section-title">// Navigasyon</div>
  <div class="help-row"><span class="help-cmd">ls</span><span class="help-arrow">вҶ’</span><span class="help-desc">bulunduДҹun dizini listele</span></div>
  <div class="help-row"><span class="help-cmd">cat [dosya]</span><span class="help-arrow">вҶ’</span><span class="help-desc">dosya iГ§eriДҹini oku</span></div>
  <div class="help-row"><span class="help-cmd">cd ..</span><span class="help-arrow">вҶ’</span><span class="help-desc">Гјst dizine dГ¶n</span></div>
  <div class="help-row"><span class="help-cmd">tree</span><span class="help-arrow">вҶ’</span><span class="help-desc">tГјm yapДұyДұ gГ¶ster</span></div>

  <div class="help-section-title">// DiДҹer</div>
  <div class="help-row"><span class="help-cmd">linkedin</span><span class="help-arrow">вҶ’</span><span class="help-desc">LinkedIn profilimi aГ§</span></div>
  <div class="help-row"><span class="help-cmd">open cv</span><span class="help-arrow">вҶ’</span><span class="help-desc">CV'yi indir</span></div>
  <div class="help-row"><span class="help-cmd">clear</span><span class="help-arrow">вҶ’</span><span class="help-desc">ekranДұ temizle</span></div>

  <div class="help-tip">рҹ’Ў BaЕҹlamak iГ§in: <span>whoami</span> &nbsp;В·&nbsp; Tab ile otomatik tamamlama</div>
</div>`);
          break;

        case 'ls': {
          let out = '';
          fs[currentPath].dirs.forEach(d  => out += `<span class="dir">${d}/</span>`);
          fs[currentPath].files.forEach(f => out += `<span class="file">${f}</span>`);
          printHTML(out);
          break;
        }

        case 'cd':
          if (!target || target === '~') { currentPath = 'home'; }
          else if (target === '..') { currentPath = 'home'; }
          else if (fs[target]) { currentPath = target; }
          else { printHTML(`<span class="c-red">cd: ${target}: dizin bulunamadДұ</span>`); }
          updatePrompt();
          break;

        case 'pwd':
          printText(currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`);
          break;

        case 'cat':
          if (!target) {
            printHTML(`<span class="c-red">kullanДұm: cat [dosya]</span>`);
          } else if (fs[currentPath].content?.[target]) {
            printText(fs[currentPath].content[target]);
          } else {
            printHTML(`<span class="c-red">cat: ${target}: dosya bulunamadДұ</span>`);
          }
          break;

        case 'whoami':
          printHTML(`<div class="info-box">
<span class="c-white bold">${profile.name}</span>  <span class="c-dim">В·</span>  ${profile.age} yaЕҹДұnda<br><br>
<span class="c-cyan">Element Management Systems / Application Operations Specialist</span><br>
<span class="c-text">TГјrk Telekom  <span class="c-dim">В·</span>  via Sekom A.Еһ.</span><br><br>
<span class="c-cyan">Kariyer :</span>  <span class="c-text">Sekom A.Еһ. (Haz 2024 вҶ’ Eki 2025)  вҶ’  TГјrk Telekom dedicated (Eki 2025 вҶ’ Halen)</span><br>
<span class="c-cyan">Hedef   :</span>  <span class="c-green">DevOps Engineer</span>  <span class="c-text">вҖ”  otomasyon В· CI/CD В· bulut altyapДұsДұ</span><br><br>
<span class="c-text">Bu site GitHub Actions + Plesk webhook ile otomatik deploy edilmektedir.</span>
</div>`);
          break;

        case 'tree': {
          let tree = `<span class="c-green">/home/atakan</span>\n`;
          const dirs  = fs.home.dirs;
          const files = fs.home.files;
          dirs.forEach((d, i) => {
            const last = i === dirs.length - 1 && files.length === 0;
            tree += `${last ? 'в””в”Җв”Җ' : 'в”ңв”Җв”Җ'} <span class="dir">${d}/</span>\n`;
          });
          files.forEach((f, i) => {
            tree += `${i === files.length - 1 ? 'в””в”Җв”Җ' : 'в”ңв”Җв”Җ'} <span class="file">${f}</span>\n`;
          });
          printHTML(tree);
          break;
        }

        case 'clear':
          historyEl.innerHTML = '';
          break;

        case 'linkedin':
          printHTML(`<span class="c-cyan">вҶ’ ${profile.linkedin}</span>`);
          window.open(profile.linkedin, '_blank');
          break;

        case 'open':
          if (target === 'cv') {
            printText('CV aГ§ДұlДұyor...');
            window.open(CV_FILE, '_blank');
          } else {
            printHTML(`<span class="c-red">kullanДұm: open cv</span>`);
          }
          break;

        default:
          if (cmd) printHTML(`<span class="c-red">komut bulunamadДұ: ${cmd}</span>  <span class="c-dim">вҖ” 'help' yaz</span>`);
      }

      addGap();
    }

    function printPromptLine(command = '') {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      const el = document.createElement('div');
      el.className = 'output';
      el.innerHTML = `<span class="prompt-user">atakan</span><span class="prompt-at">@</span><span class="prompt-host">production</span><span class="prompt-colon">:</span><span class="prompt-path">${path}</span><span class="prompt-dollar">$</span> <span class="c-white">${command}</span>`;
      historyEl.appendChild(el);
    }

    function printText(text) {
      const el = document.createElement('div');
      el.className = 'output';
      el.textContent = text;
      historyEl.appendChild(el);
    }

    function printHTML(html) {
      const el = document.createElement('div');
      el.className = 'output';
      el.innerHTML = html;
      historyEl.appendChild(el);
    }

    function addGap() {
      const el = document.createElement('div');
      el.className = 'output-gap';
      historyEl.appendChild(el);
    }

    function updatePrompt() {
      promptPathEl.textContent = currentPath === 'home' ? '~' : `~/${currentPath}`;
    }

    document.addEventListener('mouseup', () => {
      if (window.getSelection().toString().length === 0) input.focus();
    });

    document.querySelector('.btn-close').addEventListener('click', e => { e.stopPropagation(); document.body.className = 'theme-red'; });
    document.querySelector('.btn-minimize').addEventListener('click', e => { e.stopPropagation(); document.body.className = 'theme-amber'; });
    document.querySelector('.btn-maximize').addEventListener('click', e => { e.stopPropagation(); document.body.className = 'theme-green'; });

    showIntro();
  </script>
</body>
</html>
