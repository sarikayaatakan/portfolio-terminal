name: Terminal CV CI-CD

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: HTML Hint (Linting)
        run: |
          npx htmlhint index.html

      - name: Security Scan (Secret Detection)
        uses: trufflesecurity/trufflehog@main

  deploy:
    needs: lint-and-test # BURASI KRİTİK: Sadece testler geçerse çalışır.
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Sadece main branch'e push yapıldığında deploy et.
    steps:
      - name: Trigger Plesk Deployment
        run: |
          curl -X POST "${{ secrets.PLESK_WEBHOOK_URL }}"
