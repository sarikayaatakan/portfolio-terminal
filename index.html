      if (!currentWord) return;

      let matches = [];
      if (parts.length === 1) {
        matches = commands.filter(c => c.startsWith(currentWord));
      } else {
        const options = [...fs[currentPath].dirs, ...fs[currentPath].files];
        matches = options.filter(o => o.toLowerCase().startsWith(currentWord));

      if (matches.length === 1) {
        parts[parts.length - 1] = matches[0];
        input.value = parts.join(' ') + (parts.length === 1 ? ' ' : '');

        printPrompt(val);

      }

            currentPath = target;
          } else {
            printOutput(`<span class="error">bash: cd: ${target}: BГ¶yle bir dizin yok</span>`, true);
          }
          updatePrompt();
          break;

        case 'pwd':
          const fullPath = currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`;
          printOutput(fullPath, false);
          break;

        case 'cat':
          if (!target) {
            printOutput(`<span class="error">cat: dosya adД± belirtilmedi\nKullanД±m: cat [dosya]\nГ–rnek: cat readme.md</span>`, true);
          } else if (fs[currentPath].content && fs[currentPath].content[target]) {
            printOutput(fs[currentPath].content[target], false);
          } else {
            printOutput(`<span class="error">cat: ${target}: BГ¶yle bir dosya yok\n\nД°pucu: 'ls' komutu ile mevcut dosyalarД± gГ¶rebilirsin.</span>`, true);
          }
          break;

        case 'whoami':
          printOutput(`<div class="info-box"><span class="highlight">${profile.name}</span>\n${profile.age} yaЕџД±nda\n\nрџ’ј ${profile.role}\n\nрџ“Ќ Ећu anda TГјrk Telekom bГјnyesinde, Sekom A.Ећ. Гјzerinden\n   dedicated olarak uygulama operasyon sГјreГ§lerinde gГ¶rev\n   alД±yorum. DevOps Engineer rollerine doДџru planlД± Еџekilde\n   ilerliyorum.\n\nрџ•ђ Deneyim: 1.5 yД±l Sekom A.Ећ. | 4 ay TГјrk Telekom (dedicated)\n\n'cat hakkimda.txt' ile daha fazla bilgi alabilirsin.</div>`, true);
          break;

        case 'tree':
          let tree = '<span class="highlight">/home/atakan</span>\n';
          fs['home'].dirs.forEach((d, i) => {
            const isLast = i === fs['home'].dirs.length - 1 && fs['home'].files.length === 0;
            tree += `${isLast ? 'в””в”Ђв”Ђ' : 'в”њв”Ђв”Ђ'} <span class="dir">${d}/</span>\n`;
          });
          fs['home'].files.forEach((f, i) => {
            const isLast = i === fs['home'].files.length - 1;
            tree += `${isLast ? 'в””в”Ђв”Ђ' : 'в”њв”Ђв”Ђ'} ${f}\n`;
          });
          printOutput(tree, true);
          break;

        case 'clear':
          history.innerHTML = '';
          break;

        case 'linkedin':
          printOutput(`рџ”— LinkedIn profili aГ§Д±lД±yor...`, false);
          window.open(profile.linkedin, '_blank');
          break;

        case 'open':
          if (target === 'cv') {
            printOutput(`рџ“„ CV aГ§Д±lД±yor...`, false);
            window.open(CV_FILE, "_blank");
          } else {
            printOutput(`<span class="error">KullanД±m: open cv</span>`, true);
          }
          break;

        default:
          if (cmd) {
            printOutput(`<span class="error">bash: ${cmd}: komut bulunamadД±\n\n'help' yazarak mevcut komutlarД± gГ¶rebilirsin.</span>`, true);
          }
      }
    }

    function printPrompt(command = '') {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML = `<span class="prompt">atakan@production</span><span class="prompt-path">:${path}</span><span class="prompt">$</span> <span style="color:white">${command}</span>`;
      history.appendChild(resp);
    }

    function printOutput(text, isHTML = false) {
      const resp = document.createElement('div');
      resp.className = 'output';
      if (isHTML) resp.innerHTML = text; else resp.textContent = text;
      history.appendChild(resp);
    }

    function updatePrompt() {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      promptPath.textContent = `:${path}`;
    }

    document.addEventListener('click', () => input.focus());
    showIntro();
  </script>
