        }
        
        .prompt-path {
            color: #ffcc00;
            font-weight: normal;
        }
        
        .command-input { 
            background: transparent; 
            border: none; 
            color: #ffffff; 
            font-family: inherit; 
            font-size: 15px; 
            outline: none; 
            width: 70%; 
            caret-color: #00ff41;
            margin-left: 8px;
        }
        
        .output { 
            margin-bottom: 15px; 
            white-space: pre-wrap; 
            color: #d1d1d1;

        @keyframes fadeIn {

        async function typeWriter(element, text, speed = 30) {
            for (let i = 0; i < text.length; i++) {
                element.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, speed));
            }
        }

        async function showIntro() {
            const welcomeLine = document.createElement('div');
            welcomeLine.className = 'output';
            welcomeLine.style.color = '#00aaff';
            welcomeLine.style.marginBottom = '20px';
            introContainer.appendChild(welcomeLine);
            
            await typeWriter(welcomeLine, '> Initializing DevOps Portfolio System...', 40);
            await new Promise(r => setTimeout(r, 400));
            
            printOutput(`<div class="info-box">
╔════════════════════════════════════════════════════════════╗
║   Welcome to Atakan Sarıkaya's Interactive Portfolio      ║
║   Linux System Admin & DevOps Engineer                    ║
║   🎯 Currently seeking DevOps opportunities                ║
╚════════════════════════════════════════════════════════════╝

Type <span class="highlight">help</span> to see available commands
Type <span class="highlight">cat README.md</span> for quick start guide
Use <span class="highlight">Tab</span> key for auto-completion
Use <span class="highlight">↑↓</span> arrow keys for command history
</div>`, true);
            
            inputArea.style.display = 'flex';
            input.focus();
        }

        document.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    input.value = '';
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                const words = input.value.trim().split(' ');
                const lastWord = words[words.length - 1].toLowerCase();
                
                if (!lastWord) return;
                
                const commands = ['help', 'clear', 'pwd', 'ls', 'cd', 'cat', 'whoami', 'linkedin', 'tree'];
                const currentItems = [...fs[currentPath].files, ...fs[currentPath].dirs];
                const allPossible = words.length === 1 ? commands : currentItems;
                
                const matches = allPossible.filter(item => item.toLowerCase().startsWith(lastWord));
                
                if (matches.length === 1) {
                    words[words.length - 1] = matches[0];
                    input.value = words.join(' ');
                } else if (matches.length > 1) {
                    printOutput(`\nPossible matches: ${matches.join('  ')}`, false);
                    printPrompt(input.value);
                }
            }
            
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                if (!rawInput) {
                    printPrompt();
                    input.value = '';
                    return;
                }
                
                commandHistory.unshift(rawInput);
                historyIndex = -1;
                
                const args = rawInput.split(' ');
                const cmd = args[0].toLowerCase();
                const target = args.slice(1).join(' ');

                printPrompt(rawInput);
                executeCommand(cmd, target);
                
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function executeCommand(cmd, target) {
            switch(cmd) {
                case 'clear':
                    history.innerHTML = '';
                    break;
                    
                case 'help':
                    printOutput(`<div class="section-header">Available Commands</div>
<span class="highlight">Navigation:</span>
  ls               - List directory contents
  cd [dir]         - Change directory (use 'cd ..' or 'cd ~' to go back)
  pwd              - Print working directory
  tree             - Display directory structure

<span class="highlight">File Operations:</span>
  cat [file]       - Display file contents

<span class="highlight">Information:</span>
  whoami           - Display current user info
  linkedin         - Open LinkedIn profile

<span class="highlight">System:</span>
  clear            - Clear terminal screen
  help             - Show this help message

<span class="highlight">Tip:</span> Use Tab for auto-completion, ↑↓ for command history`, true);
                    break;
                    
                case 'pwd':
                    printOutput(currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`);
                    break;
                    
                case 'ls':
                    let output = '';
                    if (fs[currentPath].dirs.length > 0) {
                        fs[currentPath].dirs.forEach(d => output += `<span class="dir">${d}/</span>`);
                        output += '\n';
                    }
                    if (fs[currentPath].files.length > 0) {
                        fs[currentPath].files.forEach(f => output += `<span class="file">${f}</span>`);
                    }
                    printOutput(output, true);
                    break;
                    
                case 'tree':
                    let tree = '<span class="highlight">/home/atakan</span>\n';
                    Object.keys(fs).forEach(dir => {
                        if (dir === 'home') {
                            fs[dir].dirs.forEach(d => tree += `├── <span class="dir">${d}/</span>\n`);
                            fs[dir].files.forEach((f, i) => {
                                const prefix = i === fs[dir].files.length - 1 && fs[dir].dirs.length === 0 ? '└──' : '├──';
                                tree += `${prefix} ${f}\n`;
                            });
                        }
                    });
                    printOutput(tree, true);
                    break;
                    
                case 'cd':
                    if (!target || target === '~' || target === '..') {
                        currentPath = 'home';
                    } else if (fs[currentPath].dirs.includes(target)) {
                        currentPath = target;
                    } else {
                        printOutput(`<span class="error">bash: cd: ${target}: No such directory</span>`, true);
                    }
                    updatePrompt();
                    break;
                    
                case 'cat':
                    if (fs[currentPath].content && fs[currentPath].content[target]) {
                        printOutput(fs[currentPath].content[target]);
                        if (target === 'contact.sh') {
                            setTimeout(() => window.open(linkedin_url, '_blank'), 1000);
                        }
                    } else {
                        printOutput(`<span class="error">bash: cat: ${target}: No such file</span>`, true);
                    }
                    break;
                    
                case 'whoami':
                    printOutput(`<div class="info-box">atakan - Application Operations Specialist
Currently working at Türk Telekom
DevOps enthusiast focusing on cloud infrastructure and automation

🎯 Open to DevOps opportunities

Use 'cat about.txt' for detailed information</div>`, true);
                    break;
                    
                case 'linkedin':
                    printOutput('Opening LinkedIn profile...', false);
                    window.open(linkedin_url, '_blank');
                    break;
                    
                default:
                    if (cmd !== '') {
                        printOutput(`<span class="error">bash: ${cmd}: command not found</span>
Type 'help' to see available commands`, true);
                    }
            }
        }

        function printPrompt(command = '') {
            const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
            const resp = document.createElement('div');
            resp.className = 'output';
            resp.innerHTML = `<span class="prompt">atakan@production</span><span class="prompt-path">:${path}</span><span class="prompt">$</span> <span style="color:white">${command}</span>`;
            history.appendChild(resp);
        }

        function printOutput(text, isHTML = false) {
            const resp = document.createElement('div');
            resp.className = 'output';
            if (isHTML) {
                resp.innerHTML = text;
            } else {
                resp.textContent = text;
            }
            history.appendChild(resp);
        }

        function updatePrompt() {
            const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
            promptPath.textContent = `:${path}`;
        }

        showIntro();
    </script>
