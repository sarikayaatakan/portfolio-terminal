<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Tux.png" type="image/png" />
  <title>Atakan Sarıkaya | DevOps & Cloud Infrastructure Specialist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #00ff41;
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
      padding: 20px;
      line-height: 1.6;
      min-height: 100vh;
      cursor: text;
    }
    #terminal {
      max-width: 1100px;
      margin: 40px auto;
      background: rgba(13, 13, 13, 0.95);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 255, 65, 0.15);
      overflow: hidden;
      border: 1px solid rgba(0, 255, 65, 0.2);
    }
    .terminal-header {
      background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 100%);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.2);
      user-select: none;
    }
    .terminal-button { width: 12px; height: 12px; border-radius: 50%; }
    .btn-close { background: #ff5f57; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #28ca42; }
    .terminal-title { flex: 1; text-align: center; color: #888; font-size: 13px; letter-spacing: 0.5px; }
    .terminal-body { padding: 30px; min-height: 500px; max-height: 80vh; overflow-y: auto; }
    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: #1a1a1a; }
    .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .prompt { color: #00aaff; font-weight: bold; }
    .prompt-path { color: #ffcc00; font-weight: normal; }
    .command-input {
      background: transparent;
      border: none;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      width: 70%;
      caret-color: #00ff41;
      margin-left: 8px;
    }
    .output { margin-bottom: 15px; white-space: pre-wrap; color: #d1d1d1; animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .input-line { display: none; align-items: center; margin-top: 10px; }
    .error { color: #ff5f57; }
    .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
    .file { color: #aaa; margin-right: 15px; }
    .section-header { color: #ffcc00; font-weight: bold; margin: 20px 0 10px 0; border-bottom: 1px solid rgba(255, 204, 0, 0.3); padding-bottom: 5px; }
    .highlight { color: #00ff41; font-weight: bold; }
    .info-box { background: rgba(0, 170, 255, 0.05); border-left: 3px solid #00aaff; padding: 15px; margin: 15px 0; border-radius: 4px; }
    .loading { color: #00ff41; font-weight: bold; }
    @media (max-width: 768px) { body { padding: 10px; } #terminal { margin: 20px auto; } .terminal-body { padding: 20px; font-size: 13px; } }
  </style>
</head>
<body>
  <div id="terminal">
    <div class="terminal-header">
      <div class="terminal-button btn-close"></div>
      <div class="terminal-button btn-minimize"></div>
      <div class="terminal-button btn-maximize"></div>
      <div class="terminal-title">atakan@devops-portfolio: ~</div>
    </div>
    <div class="terminal-body" id="terminal-body">
      <div id="intro-container"></div>
      <div id="history"></div>
      <div class="input-line" id="input-area">
        <span class="prompt">atakan@production</span>
        <span class="prompt-path" id="prompt-path">:~</span>
        <span class="prompt">$</span>
        <input type="text" id="command-input" class="command-input" autofocus autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>
  <script>
    const input = document.getElementById('command-input');
    const history = document.getElementById('history');
    const inputArea = document.getElementById('input-area');
    const introContainer = document.getElementById('intro-container');
    const promptPath = document.getElementById('prompt-path');
    const terminalBody = document.getElementById('terminal-body');
    let currentPath = 'home';
    let commandHistory = [];
    let historyIndex = -1;
    const CV_FILE = "ATAKAN_SARIKAYA_DEVOPS_CV.pdf";
    const profile = {
      name: "Atakan Sarıkaya",
      age: 27,
      role: "Application Operations Specialist at Türk Telekom (via Sekom A.Ş.)",
      location: "İstanbul, Türkiye",
      linkedin: "https://www.linkedin.com/in/atakansarikaya/",
      website: "atakansarikaya.info"
    };

    const bioText = `Merhaba, ben Atakan. ${profile.age} yaşındayım. 1 buçuk senedir Sekom A.Ş. bünyesindeyim ve son 4 aydır Türk Telekom'da dedicated Application Operations Specialist olarak görev alıyorum. Linux sistem yönetimi, container teknolojileri ve izleme araçları üzerine uzmanlaşıyorum.`;

    const fs = {
      'home': {
        dirs: ['sertifikalar', 'deneyim', 'yetkinlikler', 'projeler', 'egitim'],
        files: ['readme.md', 'hakkimda.txt', 'iletisim.sh'],
        content: {
          'readme.md': `# ${profile.name}\n## DevOps & Cloud Infrastructure Specialist\n\n${bioText}\n\n📍 ${profile.location}\n🌐 ${profile.website}\n\nHızlı Başlangıç için 'help' yazabilirsin.`,
          'hakkimda.txt': `PROFESYONEL ÖZET\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n${bioText}\n\nŞu anda operasyonel süreçlerin otomasyonu, incident response ve monitoring altyapıları üzerine dedicated olarak çalışmaktayım.`,
          'iletisim.sh': `echo "LinkedIn : ${profile.linkedin}\nWeb      : ${profile.website}"`
        }
      },
      'deneyim': {
        dirs: [],
        files: ['guncel.txt', 'onceki.txt', 'staj.txt'],
        content: {
          'guncel.txt': `🏢 Türk Telekom (via Sekom A.Ş.)\n📍 Application Operations Specialist (Dedicated)\n🗓️ Ekim 2025 — Halen (Son 4 aydır dedicated)`,
          'onceki.txt': `🏢 Sekom A.Ş.\n📍 Yazılım Destek Uzmanı\n🗓️ Haziran 2024 — Ekim 2025 (1.5 sene)`,
          'staj.txt': `🏢 İBB\n📍 Software Developer Intern\n🗓️ Ağustos 2023 — Ekim 2023`
        }
      },
      'yetkinlikler': { dirs: [], files: ['ozet.txt'], content: { 'ozet.txt': 'Linux, Docker, OpenShift, Prometheus, Grafana, Bash Scripting' } },
      'sertifikalar': { dirs: [], files: ['liste.txt'], content: { 'liste.txt': 'HCCDA - Huawei Cloud, Red Hat System Admin 124' } },
      'projeler': { dirs: [], files: ['portfolio.txt'], content: { 'portfolio.txt': 'Interaktif Terminal Portfolio (JS/HTML/CSS)' } },
      'egitim': { dirs: [], files: ['okul.txt'], content: { 'okul.txt': 'Anadolu Üni - YBS / Beykent Üni - Bilgisayar Programcılığı' } }
    };
    
    const commands = ['help', 'ls', 'cd', 'cat', 'whoami', 'pwd', 'clear', 'linkedin', 'tree', 'open', 'wget'];

    function scrollToBottom() { terminalBody.scrollTop = terminalBody.scrollHeight; }

    async function showIntro() {
      const welcomeLine = document.createElement('div');
      welcomeLine.className = 'output';
      welcomeLine.style.color = '#00aaff';
      introContainer.appendChild(welcomeLine);
      await new Promise(r => setTimeout(r, 400));
      welcomeLine.textContent = '> Portföy sistemi başlatılıyor...';
      printOutput(`<div class="info-box">╔════════════════════════════════════════════════════════════╗\n║   ${profile.name} — Dedicated Operations Specialist       ║\n╚════════════════════════════════════════════════════════════╝\n\nKomutlar için 'help' yaz. Tab tuşu ile tamamlayabilirsin.</div>`, true);
      inputArea.style.display = 'flex';
      input.focus();
    }

    function handleTab(e) {
      e.preventDefault();
      const val = input.value.trim();
      const parts = val.split(' ');
      const currentWord = parts[parts.length - 1].toLowerCase();
      if (!currentWord) return;
      let matches = [];
      if (parts.length === 1) {
        matches = commands.filter(c => c.startsWith(currentWord));
      } else {
        const options = [...fs[currentPath].dirs, ...fs[currentPath].files];
        matches = options.filter(o => o.toLowerCase().startsWith(currentWord));
      }
      if (matches.length === 1) {
        parts[parts.length - 1] = matches[0];
        input.value = parts.join(' ') + (parts.length === 1 ? ' ' : '');
      } else if (matches.length > 1) {
        printOutput(`\n${matches.join('  ')}`, true);
        printPrompt(val);
        scrollToBottom();
      }
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') handleTab(e);
      if (e.key === 'Enter') {
        const rawInput = input.value.trim();
        const args = rawInput.split(' ');
        const cmd = args[0].toLowerCase();
        const target = args.slice(1).join(' ').trim().toLowerCase();
        printPrompt(rawInput);
        executeCommand(cmd, target);
        input.value = '';
        scrollToBottom();
      }
    });

    function executeCommand(cmd, target) {
      switch(cmd) {
        case 'help': printOutput(`Gezinme: ls, cd [dizin], tree, pwd\nDosya: cat [dosya]\nSistem: whoami, clear, linkedin, open cv`, true); break;
        case 'ls':
          let out = '';
          fs[currentPath].dirs.forEach(d => out += `<span class="dir">${d}/</span>`);
          fs[currentPath].files.forEach(f => out += `<span class="file">${f}</span>`);
          printOutput(out, true);
          break;
        case 'pwd':
          printOutput(currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`);
          break;
        case 'cd':
          if (!target || target === '~' || target === '..') currentPath = 'home';
          else if (fs[currentPath].dirs.includes(target)) currentPath = target;
          else printOutput(`<span class="error">Dizin bulunamadı</span>`, true);
          updatePrompt();
          break;
        case 'cat':
          if (fs[currentPath].content && fs[currentPath].content[target]) printOutput(fs[currentPath].content[target]);
          else printOutput(`<span class="error">Dosya bulunamadı. (Örn: cat readme.md)</span>`, true);
          break;
        case 'whoami':
          printOutput(`<div class="info-box"><span class="highlight">${profile.role}</span>\n${bioText}</div>`, true);
          break;
        case 'tree':
          let tree = '<span class="highlight">/home/atakan</span>\n';
          fs['home'].dirs.forEach(d => tree += `├── <span class="dir">${d}/</span>\n`);
          fs['home'].files.forEach(f => tree += `├── ${f}\n`);
          printOutput(tree, true);
          break;
        case 'clear': history.innerHTML = ''; break;
        case 'linkedin': window.open(profile.linkedin, '_blank'); break;
        case 'open': if (target === 'cv') window.open(CV_FILE, "_blank"); break;
        default: if (cmd) printOutput(`<span class="error">bash: ${cmd}: komut bulunamadı</span>`, true);
      }
    }

    function printPrompt(command = '') {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML = `<span class="prompt">atakan@production</span><span class="prompt-path">:${path}</span><span class="prompt">$</span> <span style="color:white">${command}</span>`;
      history.appendChild(resp);
    }
    function printOutput(text, isHTML = false) {
      const resp = document.createElement('div');
      resp.className = 'output';
      if (isHTML) resp.innerHTML = text; else resp.textContent = text;
      history.appendChild(resp);
    }
    function updatePrompt() {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      promptPath.textContent = `:${path}`;
    }
    document.addEventListener('click', () => input.focus());
    showIntro();
  </script>
</body>
</html>
