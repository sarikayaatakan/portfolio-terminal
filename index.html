<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Tux.png" type="image/png" />
  <title>Atakan Sarıkaya | DevOps & Cloud Infrastructure Specialist</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #00ff41;
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
      padding: 20px;
      line-height: 1.6;
      min-height: 100vh;
      cursor: text;
    }
    #terminal {
      max-width: 1100px;
      margin: 40px auto;
      background: rgba(13, 13, 13, 0.95);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 255, 65, 0.15);
      overflow: hidden;
      border: 1px solid rgba(0, 255, 65, 0.2);
    }
    .terminal-header {
      background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 100%);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.2);
      user-select: none;
    }
    .terminal-button { width: 12px; height: 12px; border-radius: 50%; }
    .btn-close { background: #ff5f57; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #28ca42; }
    .terminal-title {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .terminal-body {
      padding: 30px;
      min-height: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .prompt { color: #00aaff; font-weight: bold; }
    .prompt-path { color: #ffcc00; }
    .command-input {
      background: transparent;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      width: 70%;
      margin-left: 8px;
    }
    .output { margin-bottom: 15px; white-space: pre-wrap; color: #d1d1d1; }
    .input-line { display: none; align-items: center; margin-top: 10px; }
    .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
    .file { color: #aaa; margin-right: 15px; }
    .error { color: #ff5f57; }
    .highlight { color: #00ff41; font-weight: bold; }
    .info-box {
      background: rgba(0, 170, 255, 0.05);
      border-left: 3px solid #00aaff;
      padding: 15px;
      margin: 15px 0;
      border-radius: 4px;
    }
  </style>
</head>

<body>
<div id="terminal">
  <div class="terminal-header">
    <div class="terminal-button btn-close"></div>
    <div class="terminal-button btn-minimize"></div>
    <div class="terminal-button btn-maximize"></div>
    <div class="terminal-title">atakan@devops-portfolio: ~</div>
  </div>

  <div class="terminal-body" id="terminal-body">
    <div id="intro-container"></div>
    <div id="history"></div>
    <div class="input-line" id="input-area">
      <span class="prompt">atakan@production</span>
      <span class="prompt-path" id="prompt-path">:~</span>
      <span class="prompt">$</span>
      <input type="text" id="command-input" class="command-input" autofocus />
    </div>
  </div>
</div>

<script>
const input = document.getElementById('command-input');
const history = document.getElementById('history');
const inputArea = document.getElementById('input-area');
const introContainer = document.getElementById('intro-container');
const terminalBody = document.getElementById('terminal-body');

let currentPath = 'home';
const profile = {
  name: "Atakan Sarıkaya",
  linkedin: "https://www.linkedin.com/in/atakansarikaya/"
};

async function typeWriter(el, text, speed = 30) {
  for (let c of text) {
    el.textContent += c;
    await new Promise(r => setTimeout(r, speed));
  }
}

function printOutput(html) {
  const d = document.createElement('div');
  d.className = 'output';
  d.innerHTML = html;
  history.appendChild(d);
  terminalBody.scrollTop = terminalBody.scrollHeight;
}

async function showIntro() {
  const line = document.createElement('div');
  line.className = 'output';
  line.style.color = '#00aaff';
  introContainer.appendChild(line);

  await typeWriter(line, '> Portföy sistemi başlatılıyor...', 40);

  printOutput(`
<div class="info-box">
╔════════════════════════════════════════════════════════════╗
║   ${profile.name} — İnteraktif Terminal Portföy            ║
║   Linux / DevOps / Cloud Odaklı Operasyon                  ║
║   🎯 DevOps fırsatlarına açık                              ║
╚════════════════════════════════════════════════════════════╝

Komutlar:
• <span class="highlight">help</span>               Komut listesini gösterir
• <span class="highlight">cat README.md</span>      Hızlı özet
• <span class="highlight">cat hakkimda.txt</span>   Profesyonel özet
• <span class="highlight">linkedin</span>           LinkedIn profilimi açar
• <span class="highlight">cd deneyim</span>         Deneyimler
• <span class="highlight">cd yetkinlikler</span>    Teknik yetkinlikler
• <span class="highlight">cd sertifikalar</span>    Sertifikalar
• <span class="highlight">cd projeler</span>        Projeler
• <span class="highlight">cd egitim</span>          Eğitim
</div>
`);

  inputArea.style.display = 'flex';
  input.focus();
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    const line = document.createElement('div');
    line.className = 'output';
    line.textContent = `atakan@production:~$ ${cmd}`;
    history.appendChild(line);

    if (cmd === 'linkedin') {
      window.open(profile.linkedin, '_blank');
    }
    input.value = '';
    terminalBody.scrollTop = terminalBody.scrollHeight;
  }
});

showIntro();
</script>
</body>
</html>
