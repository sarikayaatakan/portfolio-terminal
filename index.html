    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #00ff41;
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
      padding: 20px;
      line-height: 1.6;
      min-height: 100vh;
      cursor: text;
    }

    #terminal {
      max-width: 1100px;
      margin: 40px auto;
      background: rgba(13, 13, 13, 0.95);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 255, 65, 0.15);
      overflow: hidden;
      border: 1px solid rgba(0, 255, 65, 0.2);
    }

    .terminal-header {
      background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 100%);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.2);
      user-select: none;
    }

    .terminal-button {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .btn-close { background: #ff5f57; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #28ca42; }

    .terminal-title {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      padding: 30px;
      min-height: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: #1a1a1a; }
    .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .prompt { color: #00aaff; font-weight: bold; }
    .prompt-path { color: #ffcc00; font-weight: normal; }

    .command-input {
      background: transparent;
      border: none;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      width: 70%;
      caret-color: #00ff41;
      margin-left: 8px;
    }

    .output {
      margin-bottom: 15px;
      white-space: pre-wrap;
      color: #d1d1d1;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-line {
      display: none;
      align-items: center;
      margin-top: 10px;
    }

    .error { color: #ff5f57; }

    .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
    .file { color: #aaa; margin-right: 15px; }

    .section-header {
      color: #ffcc00;
      font-weight: bold;
      margin: 20px 0 10px 0;
      border-bottom: 1px solid rgba(255, 204, 0, 0.3);
      padding-bottom: 5px;
    }

    .highlight { color: #00ff41; font-weight: bold; }

    .info-box {
      background: rgba(0, 170, 255, 0.05);
      border-left: 3px solid #00aaff;
      padding: 15px;
      margin: 15px 0;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      #terminal { margin: 20px auto; }
      .terminal-body { padding: 20px; font-size: 13px; }
    }
  </style>
</head>
