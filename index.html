<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atakan Sarıkaya | DevOps Engineer Candidate</title>
    <style>
        /* CSS Kısmı - Görsellik Sabit Tutuldu */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff41; 
            font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; 
            padding: 20px; 
            line-height: 1.6; 
            min-height: 100vh;
        }
        #terminal { 
            max-width: 1100px; 
            margin: 40px auto;
            background: rgba(13, 13, 13, 0.95);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 255, 65, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }
        .terminal-header {
            background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
        }
        .terminal-button { width: 12px; height: 12px; border-radius: 50%; }
        .btn-close { background: #ff5f57; }
        .btn-minimize { background: #ffbd2e; }
        .btn-maximize { background: #28ca42; }
        .terminal-title { flex: 1; text-align: center; color: #888; font-size: 13px; }
        .terminal-body { padding: 30px; min-height: 500px; max-height: 80vh; overflow-y: auto; }
        .prompt { color: #00aaff; font-weight: bold; }
        .prompt-path { color: #ffcc00; font-weight: normal; }
        .command-input { 
            background: transparent; border: none; color: #ffffff; 
            font-family: inherit; font-size: 15px; outline: none; 
            width: 70%; caret-color: #00ff41; margin-left: 8px;
        }
        .output { margin-bottom: 15px; white-space: pre-wrap; color: #d1d1d1; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .input-line { display: none; align-items: center; margin-top: 10px; }
        .boot-log { color: #888; margin-bottom: 3px; font-size: 13px; }
        .ok { color: #00ff41; font-weight: bold; }
        .error { color: #ff5f57; }
        .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
        .file { color: #aaa; margin-right: 15px; }
        .section-header { color: #ffcc00; font-weight: bold; margin: 20px 0 10px 0; border-bottom: 1px solid rgba(255, 204, 0, 0.3); padding-bottom: 5px; }
        .highlight { color: #00ff41; font-weight: bold; }
        .info-box { background: rgba(0, 170, 255, 0.05); border-left: 3px solid #00aaff; padding: 15px; margin: 15px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="terminal">
        <div class="terminal-header">
            <div class="terminal-button btn-close"></div>
            <div class="terminal-button btn-minimize"></div>
            <div class="terminal-button btn-maximize"></div>
            <div class="terminal-title">atakan@devops-portfolio: ~</div>
        </div>
        <div class="terminal-body">
            <div id="boot-container"></div>
            <div id="history"></div>
            <div class="input-line" id="input-area">
                <span class="prompt">atakan@production</span><span class="prompt-path" id="prompt-path">:~</span><span class="prompt">$</span>
                <input type="text" id="command-input" class="command-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const inputArea = document.getElementById('input-area');
        const bootContainer = document.getElementById('boot-container');
        const promptPath = document.getElementById('prompt-path');
        
        let currentPath = 'home';
        let commandHistory = [];
        let historyIndex = -1;
        const linkedin_url = "https://www.linkedin.com/in/atakansarikaya/";

        const fs = {
            'home': {
                dirs: ['experience', 'skills', 'certifications'],
                files: ['README.md', 'about.txt', 'contact.sh'],
                content: {
                    'README.md': `# Atakan Sarıkaya
## Linux System Admin & DevOps Engineer Candidate

🚀 **DURUM: Aktif olarak DevOps / Cloud Operations rollerinde yeni fırsatlara açığım.**

👨‍💻 Uygulama Operasyon Uzmanı @ Türk Telekom
🐧 Odak: Linux (RHEL), Konteyner Teknolojileri ve Otomasyon

### Başlangıç Kılavuzu
• cat about.txt       - Kariyer özeti ve hedefim
• ls experience/      - İş tecrübem
• ls skills/          - Teknik yetkinliklerim
• cat contact.sh      - İletişim & LinkedIn

Komutları listelemek için 'help' yazabilirsin.`,
                    
                    'about.txt': `KARİYER ÖZETİ & HEDEF
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Sistem yönetimi temelinden gelerek, uygulama operasyonlarında 
uzmanlaşmış bir profesyonelim. Mevcut tecrübelerimi modern 
DevOps pratikleri (CI/CD, IaC) ile birleştirerek bulut tabanlı 
çözümler üretmeyi hedefliyorum.

Şu an aktif olarak DevOps pozisyonları için görüşmelere açığım.

LAB DONANIMI:
├── CPU: Ryzen 5 7500X3D
├── GPU: RTX 5070
└── OS: RHEL / Ubuntu Server`,
                    
                    'contact.sh': `#!/bin/bash
echo "LinkedIn: ${linkedin_url}"
echo "Konum: İstanbul"
echo "Rol: Uygulama Operasyon Uzmanı"
echo "Kariyer Durumu: DevOps fırsatlarına açık"`
                }
            },
            'experience': {
                dirs: [],
                files: ['turk_telekom.txt', 'sekom.txt'],
                content: {
                    'turk_telekom.txt': `TÜRK TELEKOM (Netaş Outsource)
📍 Uygulama Operasyon Uzmanı (Haziran 2024 - Günümüz)
• Enterprise sistemlerin operasyonel yönetimi ve izlenmesi.
• RHEL sistemlerde sorun giderme ve performans takibi.`,
                    'sekom.txt': `SEKOM
📍 Yazılım Destek / Cloud Operations (1 Yıl 3 Ay)
• Docker tabanlı uygulama takibi ve bulut operasyonları.`
                }
            },
            'skills': {
                dirs: [],
                files: ['linux.txt', 'containers.txt', 'roadmap.txt'],
                content: {
                    'linux.txt': `LINUX & SYSTEMS
• Red Hat Enterprise Linux (RHEL) & CentOS
• Systemd, Service Management, Network Troubleshooting
• Bash Scripting ve Sistem Otomasyonu`,
                    'containers.txt': `CONTAINERS
• Docker (Container yönetimi ve optimizasyon)
• OpenShift (Uygulama dağıtımı ve izleme)`,
                    'roadmap.txt': `ÖĞRENİM SÜRECİ
• CI/CD Pipelines (Jenkins, GitLab CI)
• Infrastructure as Code (Terraform)`
                }
            },
            'certifications': {
                dirs: [],
                files: ['hccda.txt', 'rh124.txt'],
                content: {
                    'hccda.txt': `📜 Huawei Cloud Certified Associate (HCCDA)`,
                    'rh124.txt': `📜 Red Hat System Administration (RH124)`
                }
            }
        };

        const bootMessages = [
            "[  0.000000] Initializing Atakan's Portfolio...",
            "[  0.452312] Scanning for DevOps opportunities...",
            "[  OK  ] Career Mode: Enabled",
            "[  OK  ] Systems ready.",
            "",
            "Sistem başarıyla yüklendi. Hoş geldin, Atakan.",
            ""
        ];

        async function runBootSequence() {
            for (let msg of bootMessages) {
                const log = document.createElement('div');
                log.className = 'boot-log';
                log.innerHTML = msg.replace(/\[ OK \]/g, "<span class='ok'>[ OK ]</span>");
                bootContainer.appendChild(log);
                await new Promise(r => setTimeout(r, 40));
            }
            inputArea.style.display = 'flex';
            input.focus();
        }

        // DÜZELTİLMİŞ TAB VE NAVİGASYON MANTIĞI
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const currentVal = input.value.trim().toLowerCase();
                if (!currentVal) return;

                const pool = [
                    'ls', 'cd', 'cat', 'help', 'clear', 'whoami', 'tree', 'linkedin',
                    ...fs[currentPath].files, 
                    ...fs[currentPath].dirs
                ];

                const match = pool.find(cmd => cmd.startsWith(currentVal.split(' ').pop()));
                if (match) {
                    const parts = input.value.split(' ');
                    parts[parts.length - 1] = match;
                    input.value = parts.join(' ');
                }
            }
            
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                if (!rawInput) { printPrompt(); input.value = ''; return; }
                commandHistory.unshift(rawInput);
                const [cmd, ...args] = rawInput.toLowerCase().split(/\s+/);
                const target = args.join(' ');
                printPrompt(rawInput);
                executeCommand(cmd, target);
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function executeCommand(cmd, target) {
            switch(cmd) {
                case 'ls':
                    let output = '';
                    fs[currentPath].dirs.forEach(d => output += `<span class="dir">${d}/</span>`);
                    fs[currentPath].files.forEach(f => output += `<span class="file">${f}</span>`);
                    printOutput(output || 'Klasör boş', true);
                    break;
                case 'cd':
                    if (!target || target === '~' || target === '..') { currentPath = 'home'; }
                    else if (fs[currentPath].dirs.includes(target)) { currentPath = target; }
                    else { printOutput(`<span class="error">Dizin bulunamadı: ${target}</span>`, true); }
                    updatePrompt();
                    break;
                case 'cat':
                    if (fs[currentPath].content && fs[currentPath].content[target]) {
                        printOutput(fs[currentPath].content[target]);
                        if (target === 'contact.sh') setTimeout(() => window.open(linkedin_url, '_blank'), 1000);
                    } else { printOutput(`<span class="error">Dosya bulunamadı: ${target}</span>`, true); }
                    break;
                case 'help':
                    printOutput("Komutlar: ls, cd [dizin], cat [dosya], tree, clear, linkedin, whoami");
                    break;
                case 'tree':
                    let tree = '<span class="highlight">/home/atakan</span>\n';
                    fs['home'].dirs.forEach(d => tree += `├── <span class="dir">${d}/</span>\n`);
                    fs['home'].files.forEach(f => tree += `├── ${f}\n`);
                    printOutput(tree, true);
                    break;
                case 'clear': history.innerHTML = ''; break;
                case 'whoami': printOutput("atakan - Application Operations Specialist & DevOps Candidate"); break;
                case 'linkedin': window.open(linkedin_url, '_blank'); break;
                default: printOutput(`<span class="error">Komut bulunamadı: ${cmd}</span>`, true);
            }
        }

        function printPrompt(command = '') {
            const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
            const resp = document.createElement('div');
            resp.className = 'output';
            resp.innerHTML = `<span class="prompt">atakan@production</span><span class="prompt-path">:${path}</span><span class="prompt">$</span> <span style="color:white">${command}</span>`;
            history.appendChild(resp);
        }

        function printOutput(text, isHTML = false) {
            const resp = document.createElement('div');
            resp.className = 'output';
            if (isHTML) resp.innerHTML = text;
            else resp.textContent = text;
            history.appendChild(resp);
        }

        function updatePrompt() {
            promptPath.textContent = currentPath === 'home' ? ':~' : `:~/${currentPath}`;
        }

        runBootSequence();
    </script>
</body>
</html>
