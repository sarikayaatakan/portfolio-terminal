<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atakan Sarıkaya | System & DevOps Engineer</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff41; font-family: 'Consolas', 'Courier New', monospace; padding: 30px; line-height: 1.5; }
        #terminal { max-width: 1000px; margin: auto; }
        .prompt { color: #00aaff; }
        .command-input { background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: inherit; outline: none; width: 60%; }
        .header { color: #ffcc00; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .output { margin-bottom: 12px; white-space: pre-wrap; color: #d1d1d1; }
    </style>
</head>
<body>
    <div id="terminal">
        <div class="header">*** ATAKAN_SARIKAYA_OS [Version 1.4] - SYSTEM ADMINISTRATION CONSOLE ***</div>
        <div id="history">
            <div class="output">Welcome, Admin. Type 'help' to see all operational commands.</div>
        </div>
        <div class="input-line">
            <span class="prompt">atakan@production:~$</span>
            <input type="text" id="command-input" class="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');

        const commands = {
            'help': "Available commands: whoami, experience, orchestration, monitoring, db_ops, certifications, clear",
            
            'whoami': "Atakan Sarıkaya | 27 | System Administrator & App Ops Specialist\nCurrently managing Element Management Systems @ Turk Telekom",
            
            'experience': `1. Turk Telekom: EMS / Application Operation Specialist
2. Sekom: Software Support Specialist (DevSecOps Cloud Operations / Software Support Specialist)`,

            'orchestration': `[Application Orchestration & Deployment]
- Deployment with Docker & RedHat OpenShift Platforms.
- Manual app provisioning and configuration management.
- Service Management: Linux systemctl / systemd for Java-based applications.
- Java App Deployment: ROOT (WAR/JAR) file management.`,

            'monitoring': `[Monitoring & Logging]
- Solutions: Prometheus & Grafana implementation.
- Ops: Log analysis, monitoring, and proactive alarm tracking.
- Reliability: Optimizing operational processes for system efficiency.`,

            'db_ops': `[Database & Task Management]
- SQL Ops: Management of PostgreSQL and Oracle DB.
- Workflow: Jira & Confluence for task tracking and documentation.`,

            'certifications': `[Professional Certifications]
- HCCDA - Tech Essentials
- RedHat Linux System Administration (RH124) - Training
- Network Essentials - BTK Akademi
- SQL with Applications - BTK Akademi`,

            'clear': ""
        };

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase().trim();
                const output = document.createElement('div');
                output.innerHTML = `<span class="prompt">atakan@production:~$</span> <span style="color:white">${cmd}</span>`;
                history.appendChild(output);

                if (cmd === 'clear') {
                    history.innerHTML = '';
                } else if (commands[cmd]) {
                    const response = document.createElement('div');
                    response.className = 'output';
                    response.textContent = commands[cmd];
                    history.appendChild(response);
                } else if (cmd !== "") {
                    const error = document.createElement('div');
                    error.textContent = `-bash: ${cmd}: command not found. Reference 'help'.`;
                    history.appendChild(error);
                }
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });
    </script>
</body>
</html>
