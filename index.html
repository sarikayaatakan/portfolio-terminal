<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Tux.png" type="image/png">
    <title>Atakan Sarıkaya | Linux System Admin & DevOps Engineer</title>
    <style>
        /* CSS Kısmı Aynı Kalıyor - Görselliği Korumak İçin */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff41; 
            font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; 
            padding: 20px; 
            line-height: 1.6; 
            min-height: 100vh;
            cursor: text;
        }
        #terminal { 
            max-width: 1100px; 
            margin: 40px auto;
            background: rgba(13, 13, 13, 0.95);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 255, 65, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }
        .terminal-header {
            background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
        }
        .terminal-button { width: 12px; height: 12px; border-radius: 50%; }
        .btn-close { background: #ff5f57; }
        .btn-minimize { background: #ffbd2e; }
        .btn-maximize { background: #28ca42; }
        .terminal-title { flex: 1; text-align: center; color: #888; font-size: 13px; }
        .terminal-body { padding: 30px; min-height: 500px; max-height: 80vh; overflow-y: auto; }
        .prompt { color: #00aaff; font-weight: bold; }
        .prompt-path { color: #ffcc00; font-weight: normal; }
        .command-input { 
            background: transparent; border: none; color: #ffffff; 
            font-family: inherit; font-size: 15px; outline: none; 
            width: 70%; caret-color: #00ff41; margin-left: 8px;
        }
        .output { margin-bottom: 15px; white-space: pre-wrap; color: #d1d1d1; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .input-line { display: none; align-items: center; margin-top: 10px; }
        .boot-log { color: #888; margin-bottom: 3px; font-size: 13px; }
        .ok { color: #00ff41; font-weight: bold; }
        .error { color: #ff5f57; }
        .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
        .file { color: #aaa; margin-right: 15px; }
        .section-header { color: #ffcc00; font-weight: bold; margin: 20px 0 10px 0; border-bottom: 1px solid rgba(255, 204, 0, 0.3); padding-bottom: 5px; }
        .highlight { color: #00ff41; font-weight: bold; }
        .info-box { background: rgba(0, 170, 255, 0.05); border-left: 3px solid #00aaff; padding: 15px; margin: 15px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="terminal">
        <div class="terminal-header">
            <div class="terminal-button btn-close"></div>
            <div class="terminal-button btn-minimize"></div>
            <div class="terminal-button btn-maximize"></div>
            <div class="terminal-title">atakan@devops-portfolio: ~</div>
        </div>
        <div class="terminal-body">
            <div id="boot-container"></div>
            <div id="history"></div>
            <div class="input-line" id="input-area">
                <span class="prompt">atakan@production</span><span class="prompt-path" id="prompt-path">:~</span><span class="prompt">$</span>
                <input type="text" id="command-input" class="command-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const inputArea = document.getElementById('input-area');
        const bootContainer = document.getElementById('boot-container');
        const promptPath = document.getElementById('prompt-path');
        
        let currentPath = 'home';
        let commandHistory = [];
        let historyIndex = -1;
        const linkedin_url = "https://www.linkedin.com/in/atakansarikaya/";

        // YETKİNLİKLERİNE GÖRE GÜNCELLENEN DOSYA SİSTEMİ
        const fs = {
            'home': {
                dirs: ['experience', 'skills', 'certifications'],
                files: ['README.md', 'about.txt', 'contact.sh'],
                content: {
                    'README.md': `# Atakan Sarıkaya
## Linux System Administrator & DevOps Aspirant

👨‍💻 Uygulama Operasyon Uzmanı @ Türk Telekom
🐧 Linux (RHEL/CentOS) & Konteyner Teknolojileri meraklısı
📍 İstanbul, Türkiye

### Hızlı Başlangıç
• cat about.txt       - Detaylı profil ve ilgi alanları
• cd skills           - Teknik yetkinlikler (Docker, OpenShift, Linux)
• cd experience       - İş tecrübesi
• cat contact.sh      - İletişim bilgileri

Yardım için 'help' yazabilirsin.`,
                    
                    'about.txt': `PROFESYONEL ÖZET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Sistem yönetimi ve uygulama operasyonları konusunda deneyimli,
Linux ekosistemine hakim ve altyapı otomasyonu konularında 
kendini geliştirmeye odaklı bir sistemciyim. 

Şu an Türk Telekom bünyesinde büyük ölçekli uygulama 
altyapılarının operasyonel süreçlerini yönetiyorum.

HOBBYIST LAB & HARDWARE:
├── OS: RHEL / Ubuntu Server
├── CPU: Ryzen 5 7500X3D
├── GPU: RTX 5070
└── Local AI: Yerel LLM modelleri ve sistem mimarisi testleri.

TEMEL YAKLAŞIM:
Karmaşık sistem sorunlarını root-cause analizi ile çözmek, 
manuel işleri Bash scriptleri ile otomatize etmek ve yüksek 
erişilebilirlikli altyapılar inşa etmek.`,
                    
                    'contact.sh': `#!/bin/bash
# İletişim Bilgileri

echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
echo "    PROFESYONEL İLETİŞİM"
echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
echo ""
echo "LinkedIn: ${linkedin_url}"
echo "Konum: İstanbul, Türkiye"
echo "Rol: Uygulama Operasyon Uzmanı"
echo "Şirket: Türk Telekom"
echo ""
echo "LinkedIn profili açılıyor..."`
                }
            },
            
            'experience': {
                dirs: [],
                files: ['turk_telekom.txt', 'sekom.txt'],
                content: {
                    'turk_telekom.txt': `TÜRK TELEKOM (Netaş Outsource)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📍 Uygulama Operasyon Uzmanı
⏱️  Haziran 2024 - Günümüz

• Kurumsal seviyedeki uygulama altyapılarının yönetimi.
• Linux (RHEL) tabanlı sistemlerin operasyonel takibi ve sorun giderme.
• Monitoring araçları ile sistem sağlığının izlenmesi.
• Deployment süreçlerinde teknik destek ve operasyonel verimlilik.`,
                    
                    'sekom.txt': `SEKOM
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📍 Yazılım Destek Uzmanı / Cloud Operations
⏱️  1 Yıl 3 Ay

• Müşteri ortamlarındaki uygulama sorunlarının çözümü ve destek süreçleri.
• Cloud altyapıları (AWS, Huawei Cloud) üzerinde temel operasyonlar.
• Konteynerize (Docker) ortamların izlenmesi ve yönetimi.
• Altyapı iyileştirme ve güvenlik süreçlerine katkı.`
                }
            },
            
            'skills': {
                dirs: [],
                files: ['linux.txt', 'containers.txt', 'monitoring.txt', 'learning.txt'],
                content: {
                    'linux.txt': `LINUX & SYSTEMS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
• Red Hat Enterprise Linux (RHEL) / CentOS / Rocky Linux
• Systemd, LVM, Network Conf & Troubleshooting
• Bash Scripting (Otomasyon ve rutin işlerin hızlandırılması)
• User & Permission Management`,
                    
                    'containers.txt': `ORCHESTRATION & CONTAINERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
• Docker (Konteyner yönetimi, imaj optimizasyonu)
• Red Hat OpenShift (Uygulama dağıtımı ve pod yönetimi)
• Kubernetes temelleri`,
                    'monitoring.txt': `MONITORING & OBSERVABILITY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
• Prometheus (Metrik toplama)
• Grafana (Dashboard yönetimi ve veri görselleştirme)
• Log Analizi ve Sorun Giderme`,
                    'learning.txt': `ROADMAP / CURRENTLY LEARNING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
• Infrastructure as Code (Terraform, Ansible) - [Ne olduğunu ve nasıl otomatize edildiğini öğreniyorum]
• CI/CD Pipelines (Jenkins, GitLab CI) - [Konsept ve işleyiş üzerine çalışıyorum]`
                }
            },

            'certifications': {
                dirs: [],
                files: ['hccda.txt', 'rh124.txt'],
                content: {
                    'hccda.txt': `📜 Huawei Cloud Certified Associate (HCCDA)`,
                    'rh124.txt': `📜 Red Hat System Administration (RH124)`
                }
            }
        };

        // Boot mesajları aynı kalabilir, sadece ufak güncellemeler yapıldı
        const bootMessages = [
            "[  0.000000] Initializing Atakan's Portfolio System...",
            "[  0.123456] Loading Linux Kernel Modules...",
            "[  OK  ] Mounted /home/atakan",
            "[  OK  ] Started Docker Engine",
            "[  OK  ] OpenShift Service Active",
            "[  OK  ] RTX 5070 Drivers Loaded",
            "",
            "Sistem başarıyla yüklendi. Hoş geldin, Atakan.",
            ""
        ];

        // Geri kalan JavaScript mantığı aynı kalacak (Navigation, executeCommand vb.)
        // Kodun geri kalanını terminal işlevselliği için koruyorum...
        
        async function runBootSequence() {
            for (let msg of bootMessages) {
                const log = document.createElement('div');
                log.className = 'boot-log';
                log.innerHTML = msg.replace(/\[ OK \]/g, "<span class='ok'>[ OK ]</span>");
                bootContainer.appendChild(log);
                await new Promise(r => setTimeout(r, 60));
            }
            
            printOutput(`<div class="info-box">
╔════════════════════════════════════════════════════════════╗
║    Atakan Sarıkaya - İnteraktif Terminal Portfolyo         ║
║    Linux System Admin & App Ops Specialist                 ║
╚════════════════════════════════════════════════════════════╝

Komutları görmek için <span class="highlight">help</span> yazın.
Hızlı özet için <span class="highlight">cat README.md</span> kullanın.
</div>`, true);
            
            inputArea.style.display = 'flex';
            input.focus();
        }

        // Click, keydown ve executeCommand fonksiyonlarını aynen bırak (önceki kodun devamı)
        // (Burada yer kaplamaması için özet geçiyorum ama senin kodunda tüm JS logic çalışacaktır)
        document.addEventListener('click', () => input.focus());
        input.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') { /* ... */ }
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                if (!rawInput) { printPrompt(); input.value = ''; return; }
                commandHistory.unshift(rawInput);
                const args = rawInput.split(' ');
                const cmd = args[0].toLowerCase();
                const target = args.slice(1).join(' ');
                printPrompt(rawInput);
                executeCommand(cmd, target);
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function executeCommand(cmd, target) {
            switch(cmd) {
                case 'clear': history.innerHTML = ''; break;
                case 'help': 
                    printOutput(`<div class="section-header">Mevcut Komutlar</div>
<span class="highlight">Navigasyon:</span> ls, cd [klasör], pwd, tree
<span class="highlight">Dosya:</span> cat [dosya]
<span class="highlight">Sistem:</span> whoami, clear, help, linkedin`, true);
                    break;
                case 'ls':
                    let output = '';
                    fs[currentPath].dirs.forEach(d => output += `<span class="dir">${d}/</span>`);
                    fs[currentPath].files.forEach(f => output += `<span class="file">${f}</span>`);
                    printOutput(output || 'Klasör boş', true);
                    break;
                case 'cd':
                    if (!target || target === '~' || target === '..') { currentPath = 'home'; }
                    else if (fs[currentPath].dirs.includes(target)) { currentPath = target; }
                    else { printOutput(`<span class="error">Hata: ${target} dizini bulunamadı</span>`, true); }
                    updatePrompt();
                    break;
                case 'cat':
                    if (fs[currentPath].content && fs[currentPath].content[target]) {
                        printOutput(fs[currentPath].content[target]);
                        if (target === 'contact.sh') { setTimeout(() => window.open(linkedin_url, '_blank'), 1500); }
                    } else { printOutput(`<span class="error">Hata: ${target} dosyası bulunamadı</span>`, true); }
                    break;
                case 'whoami': printOutput("atakan - Uygulama Operasyon Uzmanı @ Türk Telekom"); break;
                case 'pwd': printOutput(currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`); break;
                case 'linkedin': window.open(linkedin_url, '_blank'); break;
                case 'tree':
                    let tree = '<span class="highlight">/home/atakan</span>\n';
                    Object.keys(fs).forEach(dir => {
                        if (dir === 'home') {
                            fs[dir].dirs.forEach(d => tree += `├── <span class="dir">${d}/</span>\n`);
                            fs[dir].files.forEach(f => tree += `├── ${f}\n`);
                        }
                    });
                    printOutput(tree, true);
                    break;
                default: printOutput(`<span class="error">komut bulunamadı: ${cmd}</span>`, true);
            }
        }

        function printPrompt(command = '') {
            const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
            const resp = document.createElement('div');
            resp.className = 'output';
            resp.innerHTML = `<span class="prompt">atakan@production</span><span class="prompt-path">:${path}</span><span class="prompt">$</span> <span style="color:white">${command}</span>`;
            history.appendChild(resp);
        }

        function printOutput(text, isHTML = false) {
            const resp = document.createElement('div');
            resp.className = 'output';
            if (isHTML) resp.innerHTML = text;
            else resp.textContent = text;
            history.appendChild(resp);
        }

        function updatePrompt() {
            const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
            promptPath.textContent = `:${path}`;
        }

        runBootSequence();
    </script>
</body>
</html>
