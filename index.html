<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Tux.png" type="image/png" />
  <title>Atakan Sarıkaya | DevOps & Cloud Infrastructure Specialist</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #00ff41;
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
      padding: 20px;
      line-height: 1.6;
      min-height: 100vh;
      cursor: text;
    }
    #terminal {
      max-width: 1100px;
      margin: 40px auto;
      background: rgba(13, 13, 13, 0.95);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 255, 65, 0.15);
      overflow: hidden;
      border: 1px solid rgba(0, 255, 65, 0.2);
    }
    .terminal-header {
      background: linear-gradient(90deg, #1e1e1e 0%, #2d2d2d 100%);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.2);
      user-select: none;
    }
    .terminal-button { width: 12px; height: 12px; border-radius: 50%; }
    .btn-close { background: #ff5f57; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #28ca42; }
    .terminal-title { flex: 1; text-align: center; color: #888; font-size: 13px; letter-spacing: 0.5px; }

    .terminal-body { padding: 30px; min-height: 500px; max-height: 80vh; overflow-y: auto; }
    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: #1a1a1a; }
    .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .prompt { color: #00aaff; font-weight: bold; }
    .prompt-path { color: #ffcc00; font-weight: normal; }

    .command-input {
      background: transparent;
      border: none;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      width: 70%;
      caret-color: #00ff41;
      margin-left: 8px;
    }

    .output { margin-bottom: 12px; white-space: pre-wrap; color: #d1d1d1; animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .input-line { display: none; align-items: center; margin-top: 10px; }

    .error { color: #ff5f57; }
    .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
    .file { color: #aaa; margin-right: 15px; }

    .section-header { color: #ffcc00; font-weight: bold; margin: 18px 0 10px 0; border-bottom: 1px solid rgba(255, 204, 0, 0.3); padding-bottom: 5px; }
    .highlight { color: #00ff41; font-weight: bold; }

    .info-box {
      background: rgba(0, 170, 255, 0.05);
      border-left: 3px solid #00aaff;
      padding: 15px;
      margin: 12px 0;
      border-radius: 4px;
    }

    .loading { color: #00ff41; font-weight: bold; }

    @media (max-width: 768px) {
      body { padding: 10px; }
      #terminal { margin: 20px auto; }
      .terminal-body { padding: 20px; font-size: 13px; }
    }
  </style>
</head>

<body>

    };

    // Komut listesi
    const commands = ['help', 'ls', 'cd', 'cat', 'whoami', 'clear', 'linkedin', 'tree', 'open', 'wget', 'pwd', 'cv'];

    function scrollToBottom() {
      terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function printPrompt(command = '') {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML =
        `<span class="prompt">atakan@production</span>` +
        `<span class="prompt-path">:${path}</span>` +
        `<span class="prompt">$</span> ` +
        `<span style="color:white">${escapeHtml(command)}</span>`;
      history.appendChild(resp);
    }

    function printOutput(text, isHTML = false) {
      const resp = document.createElement('div');
      resp.className = 'output';
      if (isHTML) resp.innerHTML = text;
      else resp.textContent = text;
      history.appendChild(resp);
    }

    function updatePrompt() {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      promptPath.textContent = `:${path}`;
    }

    function isMobile() {
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.matchMedia("(max-width: 768px)").matches;
    }

    function startGreenLoading(message, durationMs, doneCb) {
      const id = `ld_${Date.now()}_${Math.floor(Math.random()*1000)}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML = `<span class="loading" id="${id}">${message}</span>`;
      history.appendChild(resp);
      scrollToBottom();

      const el = document.getElementById(id);
      let dots = 0;
      const t = setInterval(() => {
        dots = (dots + 1) % 4;
        if (el) el.textContent = message + '.'.repeat(dots);
      }, 180);

      setTimeout(() => {
        clearInterval(t);
        if (el) el.textContent = message + " ✓";
        scrollToBottom();
        if (typeof doneCb === "function") doneCb();
      }, durationMs);
    }

    // --- CV komutları ---
    function cvHelpText() {
      return `CV KOMUTLARI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
cat cv        - CV komutları ve dosya bilgisi
open cv       - CV'yi yeni sekmede aç
wget cv       - CV'yi indir (mobilde görüntüleme moduna geçer)

Alternatif:
cv            - yardım
cv view       - görüntüle
cv download   - indir

Dosya: ${CV_FILE}`;
    }

    function cvOpen() {
      startGreenLoading("CV hazırlanıyor", 900, () => window.open(CV_FILE, "_blank"));
    }

    function cvDownloadDesktop() {
      const a = document.createElement('a');
      a.href = CV_FILE;
      a.download = CV_FILE;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function showIntro() {
      const welcomeLine = document.createElement('div');
      welcomeLine.className = 'output';
      welcomeLine.style.color = '#00aaff';
      introContainer.appendChild(welcomeLine);

      // küçük "boot" hissi
      await new Promise(r => setTimeout(r, 350));
      welcomeLine.textContent = '> Portföy sistemi başlatılıyor...';

      printOutput(
        `<div class="info-box">╔════════════════════════════════════════════════════════════╗
║   ${profile.name} — İnteraktif Terminal Portföy            ║
║   Türk Telekom via Sekom A.Ş. (Dedicated)                  ║
╚════════════════════════════════════════════════════════════╝

Komutlar:
• <span class="highlight">help</span>               Komut listesini gösterir
• <span class="highlight">cat readme.md</span>      Hızlı özet
• <span class="highlight">cat hakkimda.txt</span>   Profesyonel özet
• <span class="highlight">cd deneyim</span>         Deneyimler
• <span class="highlight">open cv</span>            CV'yi görüntüler
• <span class="highlight">wget cv</span>            CV'yi indirir (mobilde görüntüler)

İpucu: Tab ile tamamlama, ↑↓ ile geçmiş.</div>`,
        true
      );

      inputArea.style.display = 'flex';
      input.focus();
      updatePrompt();
      scrollToBottom();
    }

    // ---- TAB tamamlama (cat readme.md çalışsın, "cat " durumunu da yakalasın) ----
    function handleTab(e) {
      e.preventDefault();

      const raw = input.value;
      const endsWithSpace = /\s$/.test(raw);

      // tokens: fazla boşlukları normalize et
      const tokens = raw.split(/\s+/).filter(Boolean);
      if (endsWithSpace) tokens.push(''); // yeni argüman bekleniyor

      const lastToken = (tokens[tokens.length - 1] || '').toLowerCase();

      // 1 token: komut, 2+ token: hedef (dosya/dizin)
      let candidates = [];
      if (tokens.length <= 1) {
        candidates = commands;
      } else {
        candidates = [...fs[currentPath].dirs, ...fs[currentPath].files, 'cv'];
      }

      const matches = candidates.filter(x => x.toLowerCase().startsWith(lastToken));

      if (matches.length === 1) {
        tokens[tokens.length - 1] = matches[0];

        // input'u yeniden kur
        const rebuilt = tokens.filter((t, i) => !(endsWithSpace && i === tokens.length - 1 && t === '')).join(' ');
        input.value = rebuilt;

        // komut tamamlandıysa (tek token), bir boşluk koy ki argümana geçsin
        if (tokens.length === 1) input.value += ' ';
      } else if (matches.length > 1) {
        printOutput(`\n${matches.join('  ')}`, false);
        printPrompt(raw.trim());
        scrollToBottom();
      }
    }

    // case-insensitive dosya çözümleme (cat README.md / cat readme.md)
    function resolveContentKey(pathKey, targetLower) {
      const contentMap = fs[pathKey] && fs[pathKey].content ? fs[pathKey].content : null;
      if (!contentMap) return null;
      const keys = Object.keys(contentMap);
      return keys.find(k => k.toLowerCase() === targetLower) || null;
    }

    function executeCommand(cmd, target) {
      switch (cmd) {
        case 'help':
          printOutput(
`Komutlar:
  ls                 - Dizin içeriğini listeler
  cd [dizin]         - Dizine geçiş (cd .. / cd ~)
  pwd                - Bulunduğun dizini gösterir
  tree               - Klasör yapısını gösterir

  cat [dosya]        - Dosya içeriğini gösterir
  whoami             - Kısa profil
  linkedin           - LinkedIn profilini açar

  cat cv             - CV komutları
  open cv            - CV görüntüle
  wget cv            - CV indir (mobilde görüntüler)
  cv                 - yardım (cv view / cv download)

  clear              - Ekranı temizler`, false);
          break;

        case 'pwd':
          printOutput(currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`, false);
          break;

        case 'ls': {
          let out = '';
          if (fs[currentPath].dirs.length) {
            fs[currentPath].dirs.forEach(d => out += `<span class="dir">${d}/</span>`);
            out += '\n';
          }
          if (fs[currentPath].files.length) {
            fs[currentPath].files.forEach(f => out += `<span class="file">${f}</span>`);
          }
          printOutput(out, true);
          break;
        }

        case 'tree': {
          let tree = '<span class="highlight">/home/atakan</span>\n';
          fs['home'].dirs.forEach(d => tree += `├── <span class="dir">${d}/</span>\n`);
          fs['home'].files.forEach(f => tree += `├── ${f}\n`);
          tree += `└── ${CV_FILE}\n`;
          printOutput(tree, true);
          break;
        }

        case 'cd':
          if (!target || target === '~' || target === '..') {
            currentPath = 'home';
          } else if (fs[currentPath].dirs.includes(target)) {
            currentPath = target;
          } else {
            printOutput(`<span class="error">bash: cd: ${escapeHtml(target)}: Böyle bir dizin yok</span>`, true);
          }
          updatePrompt();
          break;

        case 'cat': {
          if (!target) {
            printOutput(`<span class="error">Kullanım: cat [dosya]</span>`, true);
            break;
          }

          // cat cv özel
          if (target === 'cv') {
            printOutput(cvHelpText(), false);
            break;
          }

          const key = resolveContentKey(currentPath, target);
          if (key) {
            printOutput(fs[currentPath].content[key], false);
          } else {
            printOutput(`<span class="error">bash: cat: ${escapeHtml(target)}: Böyle bir dosya yok</span>`, true);
          }
          break;
        }

        case 'whoami':
          printOutput(
            `<div class="info-box"><span class="highlight">${profile.name}</span>
${profile.roleLong} | ${profile.location}

${profile.bioShort}

İpucu: detay için <span class="highlight">cat hakkimda.txt</span></div>`,
            true
          );
          break;

        case 'linkedin':
          printOutput('LinkedIn profili açılıyor...', false);
          window.open(profile.linkedin, '_blank');
          break;

        case 'open':
          if (target === 'cv') cvOpen();
          else printOutput(`<span class="error">Kullanım: open cv</span>`, true);
          break;

        case 'wget':
          if (target === 'cv') {
            if (isMobile()) {
              printOutput("Mobil cihaz tespit edildi. İndirmek yerine CV görüntüleniyor...", false);
              cvOpen();
            } else {
              startGreenLoading("CV indiriliyor", 700, () => cvDownloadDesktop());
            }
          } else {
            printOutput(`<span class="error">Kullanım: wget cv</span>`, true);
          }
          break;

        case 'cv':
          if (!target) { printOutput(cvHelpText(), false); break; }
          if (target === 'view') { cvOpen(); break; }
          if (target === 'download') {
            if (isMobile()) {
              printOutput("Mobil cihaz tespit edildi. İndirmek yerine CV görüntüleniyor...", false);
              cvOpen();
            } else {
              startGreenLoading("CV indiriliyor", 700, () => cvDownloadDesktop());
            }
            break;
          }
          printOutput(`<span class="error">Kullanım: cv | cv view | cv download</span>`, true);
          break;

        case 'clear':
          history.innerHTML = '';
          break;

        default:
          if (cmd) {
            printOutput(
              `<span class="error">bash: ${escapeHtml(cmd)}: komut bulunamadı</span>
Komutlar için 'help' yaz.`,
              true
            );
          }
      }
    }

    // input eventleri
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') return handleTab(e);

      // geçmiş (↑↓)
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
          input.value = commandHistory[historyIndex];
        }
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          input.value = commandHistory[historyIndex];
        } else if (historyIndex === 0) {
          historyIndex = -1;
          input.value = '';
        }
        return;
      }

      if (e.key === 'Enter') {
        e.preventDefault();
        const rawInput = input.value.trim();
        if (!rawInput) {
          printPrompt('');
          scrollToBottom();
          input.value = '';
          return;
        }

        commandHistory.unshift(rawInput);
        historyIndex = -1;

        const parts = rawInput.split(/\s+/);
        const cmd = parts[0].toLowerCase();
        const target = parts.slice(1).join(' ').trim().toLowerCase();

        printPrompt(rawInput);
        executeCommand(cmd, target);

        input.value = '';
        scrollToBottom();
      }
    });

    document.addEventListener('click', () => input.focus());

    showIntro();
  </script>
