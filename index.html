<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atakan Sarıkaya | DevOps / Cloud & Linux System Specialist</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff41; font-family: 'Consolas', 'Courier New', monospace; padding: 30px; line-height: 1.5; cursor: text; user-select: none; }
        #terminal { max-width: 1000px; margin: auto; }
        .prompt { color: #00aaff; }
        .command-input { background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: inherit; outline: none; width: 60%; caret-color: #00ff41; }
        .header { color: #ffcc00; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; display: none; }
        .output { margin-bottom: 12px; white-space: pre-wrap; color: #d1d1d1; }
        .input-line { display: none; }
        .boot-log { color: #888; margin-bottom: 2px; font-size: 13px; font-family: 'Courier New', Courier, monospace; }
        .ok { color: #00ff41; font-weight: bold; }
        .dir { color: #00aaff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="boot-container"></div>
        <div class="header" id="terminal-header">*** ATAKAN_SARIKAYA_OS [Versiyon 2.8] - FILESYSTEM CONSOLE ***</div>
        <div id="history"></div>
        <div class="input-line" id="input-area">
            <span class="prompt" id="prompt-label">atakan@production:~$</span>
            <input type="text" id="command-input" class="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const header = document.getElementById('terminal-header');
        const inputArea = document.getElementById('input-area');
        const bootContainer = document.getElementById('boot-container');
        const promptLabel = document.getElementById('prompt-label');
        
        let currentLang = 'tr';
        let currentPath = '~'; // Root path simülasyonu
        const linkedin_url = "https://www.linkedin.com/in/atakansarikaya/";

        // Güvenlik
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const bootMessages = [
            "[  0.000000] Linux version 5.14.0-70.13.1.el9_0.x86_64",
            "[  OK  ] TLS Handshake... Established",
            "[  OK  ] Loading Mock Filesystem Layer...",
            "[  OK  ] Reached target Multi-User System",
            "System is secure. Welcome, Specialist."
        ];

        const content = {
            'tr': {
                'welcome': "Erişim yetkisi verildi: misafir. Yardım için 'yardim' yazın.",
                'help': "Komutlar: yardim, kimim, tecrube, orkestrasyon, izleme, veritabanı, dokumantasyon, sertifikalar, linkedin, ls, pwd, cd, clear, en/tr",
                'whoami': "Atakan Sarıkaya | 27\nDevOps / Cloud & Linux System Specialist\nTürk Telekom bünyesinde Uygulama Operasyon Uzmanı.",
                'ls_home': "sertifikalar/  tecrube/  projeler/  cv.pdf",
                'pwd_home': "/home/atakan",
                'error': "Komut bulunamadı. Yardım için 'yardim' yazın."
            },
            'en': {
                'welcome': "Authorized Access: guest. Type 'help'.",
                'help': "Commands: help, whoami, experience, orchestration, monitoring, db_ops, documentation, certifications, linkedin, ls, pwd, cd, clear, en/tr",
                'whoami': "Atakan Sarıkaya | 27\nDevOps / Cloud & Linux System Specialist\nWorking as an App Ops Specialist @ Turk Telekom.",
                'ls_home': "certifications/  experience/  projects/  resume.pdf",
                'pwd_home': "/home/atakan",
                'error': "Command not found. Type 'help'."
            }
        };

        const cmdMap = {
            'yardim': 'help', 'help': 'help', 'kimim': 'whoami', 'whoami': 'whoami',
            'tecrube': 'experience', 'experience': 'experience', 'orkestrasyon': 'orchestration',
            'izleme': 'monitoring', 'monitoring': 'monitoring', 'veritabanı': 'db_ops', 
            'veritabani': 'db_ops', 'db_ops': 'db_ops', 'dokumantasyon': 'documentation',
            'documentation': 'documentation', 'sertifikalar': 'certifications', 
            'certifications': 'certifications', 'linkedin': 'linkedin', 'ls': 'ls', 
            'pwd': 'pwd', 'cd': 'cd', 'clear': 'clear', 'en': 'en', 'tr': 'tr'
        };

        async function runBootSequence() {
            for (let msg of bootMessages) {
                const log = document.createElement('div');
                log.className = 'boot-log';
                log.innerHTML = msg.replace("[ OK ]", "<span class='ok'>[ OK ]</span>");
                bootContainer.appendChild(log);
                await new Promise(r => setTimeout(r, 100));
            }
            bootContainer.style.display = 'none';
            header.style.display = 'block';
            inputArea.style.display = 'flex';
            printOutput(content[currentLang].welcome);
            input.focus();
        }

        document.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const val = input.value.toLowerCase().trim();
                const match = Object.keys(cmdMap).find(c => c.startsWith(val));
                if (match) input.value = match;
            }
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                const fullCmd = rawInput.toLowerCase();
                const args = fullCmd.split(' ');
                const cmd = args[0];

                printOutput(`<span class="prompt">atakan@production:${currentPath}$</span> <span style="color:white">${rawInput}</span>`, true);

                if (cmd === 'clear') {
                    history.innerHTML = '';
                } else if (cmd === 'pwd') {
                    printOutput(currentPath === '~' ? "/home/atakan" : "/home/atakan/" + currentPath.replace('~/',''));
                } else if (cmd === 'ls') {
                    printOutput(content[currentLang].ls_home);
                } else if (cmd === 'cd') {
                    if (!args[1] || args[1] === '~') {
                        currentPath = '~';
                    } else if (args[1] === '..') {
                        currentPath = '~';
                    } else {
                        currentPath = '~/' + args[1].replace('/','');
                    }
                    promptLabel.innerText = `atakan@production:${currentPath}$`;
                } else if (cmd === 'en' || cmd === 'tr') {
                    currentLang = cmd;
                    header.innerText = content[cmd].header || header.innerText;
                    printOutput(cmd === 'en' ? "Language: English" : "Dil: Türkçe");
                } else if (cmd === 'linkedin') {
                    window.open(linkedin_url, '_blank');
                } else {
                    const logicalCmd = cmdMap[cmd];
                    if (logicalCmd && content[currentLang][logicalCmd]) {
                        printOutput(content[currentLang][logicalCmd]);
                    } else if (cmd !== "") {
                        printOutput(content[currentLang].error);
                    }
                }
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function printOutput(text, isCommand = false) {
            const resp = document.createElement('div');
            resp.className = 'output';
            isCommand ? resp.innerHTML = text : resp.textContent = text;
            history.appendChild(resp);
        }

        runBootSequence();
    </script>
</body>
</html>
