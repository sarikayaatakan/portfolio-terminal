      const intro = `
<div class="info-box">
<span class="status-indicator"></span><span class="highlight">Sistem Aktif</span> | Kullanıcı: ${profile.name} | Yaş: 27

    function handleTab(e) {
      e.preventDefault();
      const val = input.value.trim();
      const parts = val.split(' ');
      const currentWord = parts[parts.length - 1].toLowerCase();

      if (!currentWord) return;

      let matches = [];
      if (parts.length === 1) {
        matches = commands.filter(c => c.startsWith(currentWord));
      } else {
        const options = [...fs[currentPath].dirs, ...fs[currentPath].files];
        matches = options.filter(o => o.toLowerCase().startsWith(currentWord));
      }

      if (matches.length === 1) {
        parts[parts.length - 1] = matches[0];
        input.value = parts.join(' ') + (parts.length === 1 ? ' ' : '');
      } else if (matches.length > 1) {
        printOutput(`\n${matches.join('  ')}`, true);
        printPrompt(val);
        scrollToBottom();
      }
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        handleTab(e);
      } else if (e.key === 'Enter') {
        const rawInput = input.value.trim();
        const args = rawInput.split(' ');
        const cmd = args[0].toLowerCase();
        const target = args.slice(1).join(' ').trim().toLowerCase();

        if (rawInput) {
          commandHistory.push(rawInput);
          historyIndex = commandHistory.length;
        }

        printPrompt(rawInput);
        executeCommand(cmd, target);
        input.value = '';
        scrollToBottom();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          input.value = commandHistory[historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
          input.value = commandHistory[historyIndex];
        } else {
          historyIndex = commandHistory.length;
          input.value = '';
        }
      }
    });

          break;

          let out = '';
          fs[currentPath].dirs.forEach(d => out += `<span class="dir">${d}/</span>`);
          fs[currentPath].files.forEach(f => out += `<span class="file">${f}</span>`);
          printOutput(out, true);
          break;

        case 'cd':
          if (!target || target === '~' || target === '') {
            currentPath = 'home';
          } else if (target === '..') {
            currentPath = 'home';
          } else if (fs[currentPath].dirs.includes(target)) {
            currentPath = target;
          } else if (fs[target]) {
            currentPath = target;
          } else {
            printOutput(`<span class="error">bash: cd: ${target}: Böyle bir dizin yok</span>`, true);
          }
          updatePrompt();
          break;

        case 'pwd':
          const fullPath = currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`;
          printOutput(fullPath, false);
          break;

        case 'cat':
          if (!target) {
            printOutput(`<span class="error">cat: dosya adı belirtilmedi\nKullanım: cat [dosya]\nÖrnek: cat readme.md</span>`, true);
          } else if (fs[currentPath].content && fs[currentPath].content[target]) {
            printOutput(fs[currentPath].content[target], false);
          } else {
            printOutput(`<span class="error">cat: ${target}: Böyle bir dosya yok\n\nİpucu: 'ls' komutu ile mevcut dosyaları görebilirsin.</span>`, true);
          }
          break;

        case 'whoami':
          printOutput(`<div class="info-box"><span class="highlight">${profile.name}</span>\n${profile.age} yaşında\n\n💼 ${profile.role}\n\n📍 Şu anda Türk Telekom bünyesinde, Sekom A.Ş. üzerinden\n   dedicated olarak uygulama operasyon süreçlerinde görev\n   alıyorum. DevOps Engineer rollerine doğru planlı şekilde\n   ilerliyorum.\n\n🕐 Deneyim: 1.5 yıl Sekom A.Ş. | 4 ay Türk Telekom (dedicated)\n\n'cat hakkimda.txt' ile daha fazla bilgi alabilirsin.</div>`, true);
          break;

        case 'tree':
          let tree = '<span class="highlight">/home/atakan</span>\n';
          fs['home'].dirs.forEach((d, i) => {
            const isLast = i === fs['home'].dirs.length - 1 && fs['home'].files.length === 0;
            tree += `${isLast ? '└──' : '├──'} <span class="dir">${d}/</span>\n`;
          });
          fs['home'].files.forEach((f, i) => {
            const isLast = i === fs['home'].files.length - 1;
            tree += `${isLast ? '└──' : '├──'} ${f}\n`;
          });
          printOutput(tree, true);
          break;

        case 'clear':
          history.innerHTML = '';
          break;

        case 'linkedin':
          printOutput(`🔗 LinkedIn profili açılıyor...`, false);
          window.open(profile.linkedin, '_blank');
          break;

        case 'open':
          if (target === 'cv') {
            printOutput(`📄 CV açılıyor...`, false);
            window.open(CV_FILE, "_blank");
          } else {
            printOutput(`<span class="error">Kullanım: open cv</span>`, true);
          }
          break;

        default:
          if (cmd) {
            printOutput(`<span class="error">bash: ${cmd}: komut bulunamadı\n\n'help' yazarak mevcut komutları görebilirsin.</span>`, true);
          }
      }
    }

    function printPrompt(command = '') {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML = `<span class="prompt">atakan@production</span><span class="prompt-path">:${path}</span><span class="prompt">$</span> <span style="color:white">${command}</span>`;
      history.appendChild(resp);
    }

    function printOutput(text, isHTML = false) {
      const resp = document.createElement('div');
      resp.className = 'output';
      if (isHTML) resp.innerHTML = text; else resp.textContent = text;
      history.appendChild(resp);
    }

    function updatePrompt() {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      promptPath.textContent = `:${path}`;
    }

    document.addEventListener('click', () => input.focus());
    
    // Theme switcher
    document.querySelector('.btn-close').addEventListener('click', (e) => {
      e.stopPropagation();
      document.body.className = 'theme-red';
      printOutput('🎨 Tema değiştirildi: Red Alert', false);
      scrollToBottom();
    });

    document.querySelector('.btn-minimize').addEventListener('click', (e) => {
      e.stopPropagation();
      document.body.className = 'theme-yellow';
      printOutput('🎨 Tema değiştirildi: Golden Sun', false);
      scrollToBottom();
    });

    document.querySelector('.btn-maximize').addEventListener('click', (e) => {
      e.stopPropagation();
      document.body.className = 'theme-green';
      printOutput('🎨 Tema değiştirildi: Matrix Green', false);
      scrollToBottom();
    });

    showIntro();
  </script>
</body>
</html>
