<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atakan Sarıkaya | DevOps / Cloud & Linux System Specialist</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff41; font-family: 'Consolas', 'Courier New', monospace; padding: 30px; line-height: 1.5; cursor: text; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        #terminal { max-width: 1000px; margin: auto; }
        .prompt { color: #00aaff; }
        .command-input { background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: inherit; outline: none; width: 60%; caret-color: #00ff41; }
        .header { color: #ffcc00; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; display: none; }
        .output { margin-bottom: 12px; white-space: pre-wrap; color: #d1d1d1; }
        .input-line { display: none; }
        .boot-log { color: #888; margin-bottom: 2px; font-size: 13px; font-family: 'Courier New', Courier, monospace; }
        .ok { color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="boot-container"></div>
        <div class="header" id="terminal-header">*** ATAKAN_SARIKAYA_OS [Versiyon 2.7] - PRODUCTION CONSOLE ***</div>
        <div id="history"></div>
        <div class="input-line" id="input-area">
            <span class="prompt">atakan@production:~$</span>
            <input type="text" id="command-input" class="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const header = document.getElementById('terminal-header');
        const inputArea = document.getElementById('input-area');
        const bootContainer = document.getElementById('boot-container');
        
        let currentLang = 'tr';
        const linkedin_url = "https://www.linkedin.com/in/atakansarikaya/";

        // Güvenlik Engelleri (Security Theater)
        document.addEventListener('contextmenu', (e) => e.preventDefault()); // Sağ tık engelleme
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12 engelleme
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U (View Source)
        };

        const bootMessages = [
            "[  0.000000] Linux version 5.14.0-70.13.1.el9_0.x86_64",
            "[  OK  ] TLS Handshake... Established",
            "[  OK  ] SSL Certificate... Let's Encrypt Verified",
            "[  OK  ] Initializing Container Runtime (Docker/CRI-O)...",
            "[  OK  ] Starting OpenShift Node Agent (Kubelet)...",
            "[  OK  ] Reached target Multi-User System",
            "Loading localized shell... [ DONE ]",
            "System is secure. Welcome to Atakan's Production Environment."
        ];

        const content = {
            'tr': {
                'header': '*** ATAKAN_SARIKAYA_OS [Versiyon 2.7] - DevOps / Cloud & Linux System Specialist ***',
                'welcome': "Erişim yetkisi verildi: misafir. Yardım için 'yardim' yazın. English? Type 'en'",
                'help': "Komutlar: yardim, kimim, tecrube, orkestrasyon, izleme, veritabanı, dokumantasyon, sertifikalar, linkedin, en/tr, clear",
                'whoami': "Atakan Sarıkaya | 27\nDevOps / Cloud & Linux System Specialist\nTürk Telekom bünyesinde (Sekom aracılığıyla) Uygulama Operasyon Uzmanı olarak çalışıyor.",
                'experience': "1. Türk Telekom (via Sekom): Uygulama Operasyon Uzmanı (6 Ay - Güncel)\n2. Sekom: Yazılım Destek Uzmanı / DevSecOps Cloud Operations (1 Yıl 3 Ay)",
                'orchestration': "[Uygulama Dağıtımı ve Yönetimi]\n- Docker ve RedHat OpenShift platformları ile uygulama dağıtımı.\n- Docker üzerinde Python tabanlı uygulamaların deployment süreçleri.\n- Linux systemd (systemctl) ile Java tabanlı servis yönetimi.\n- Kritik uygulama bileşenlerinin (ROOT/WAR/JAR) yayına alınma süreçleri.",
                'monitoring': "[İzleme ve Loglama]\n- Çözümler: Prometheus & Grafana entegrasyonu ve takibi.\n- Operasyon: Log analizi, proaktif alarm yönetimi ve sistem sağlığı denetimi.",
                'db_ops': "[Veritabanı Operasyonları]\n- SQL: PostgreSQL ve Oracle DB üzerinde operasyonel yönetim ve sorgulama.",
                'documentation': "[Dokümantasyon ve İş Takibi]\n- Jira: Agile süreç yönetimi, task takibi ve workflow yönetimi.\n- Confluence: Teknik dokümantasyon, Knowledge Base oluşturma.",
                'certifications': "[Sertifikalar]\n- Huawei Cloud Certified Associate (HCCDA) - Tech Essentials\n- RedHat Linux System Administration (RH124)\n- Ağ Temelleri & SQL - BTK Akademi",
                'linkedin': "LinkedIn profili açılıyor...",
                'lang_switched': "Dil 'İngilizce' olarak değiştirildi.",
                'error': "Komut bulunamadı. Yardım için 'yardim' yazın."
            },
            'en': {
                'header': '*** ATAKAN_SARIKAYA_OS [Version 2.7] - DevOps / Cloud & Linux System Specialist ***',
                'welcome': "Authorized Access: guest. Type 'help'. Türkçe? 'tr' yazın",
                'help': "Commands: help, whoami, experience, orchestration, monitoring, db_ops, documentation, certifications, linkedin, en/tr, clear",
                'whoami': "Atakan Sarıkaya | 27\nDevOps / Cloud & Linux System Specialist\nWorking as an Application Operation Specialist @ Turk Telekom (via Sekom).",
                'experience': "1. Turk Telekom (via Sekom): Application Operation Specialist (6 Months - Current)\n2. Sekom: Software Support Specialist / DevSecOps Cloud Operations (1 Year 3 Months)",
                'orchestration': "[App Deployment & Management]\n- Deployment on Docker & RedHat OpenShift platforms.\n- Deployment of Python-based applications on Docker.\n- Java-based service management via Linux systemd (systemctl).\n- Lifecycle management of ROOT/WAR/JAR components.",
                'monitoring': "[Monitoring & Logging]\n- Stack: Prometheus & Grafana implementation.\n- Ops: Log analysis and proactive alarm management.",
                'db_ops': "[Database Operations]\n- SQL Ops: Operational management of PostgreSQL and Oracle DB.",
                'documentation': "[Documentation & Workflow]\n- Jira: Agile project management and task tracking.\n- Confluence: Technical documentation and Knowledge Base management.",
                'certifications': "[Certifications]\n- Huawei Cloud Certified Associate (HCCDA) - Tech Essentials\n- RedHat Linux System Administration (RH124)\n- Network & SQL Essentials - BTK Akademi",
                'linkedin': "Opening LinkedIn...",
                'lang_switched': "Language switched to 'English'.",
                'error': "Command not found. Type 'help'."
            }
        };

        const cmdMap = {
            'yardim': 'help', 'help': 'help', 'kimim': 'whoami', 'whoami': 'whoami',
            'tecrube': 'experience', 'experience': 'experience', 'orkestrasyon': 'orchestration',
            'orkestrasyon': 'orchestration', 'izleme': 'monitoring', 'monitoring': 'monitoring',
            'veritabanı': 'db_ops', 'veritabani': 'db_ops', 'db_ops': 'db_ops',
            'dokumantasyon': 'documentation', 'documentation': 'documentation',
            'sertifikalar': 'certifications', 'certifications': 'certifications',
            'linkedin': 'linkedin', 'en': 'en', 'tr': 'tr', 'clear': 'clear'
        };

        async function runBootSequence() {
            for (let msg of bootMessages) {
                const log = document.createElement('div');
                log.className = 'boot-log';
                log.innerHTML = msg.replace("[ OK ]", "<span class='ok'>[ OK ]</span>");
                bootContainer.appendChild(log);
                await new Promise(r => setTimeout(r, Math.random() * 200 + 50));
            }
            await new Promise(r => setTimeout(r, 500));
            bootContainer.style.display = 'none';
            header.style.display = 'block';
            inputArea.style.display = 'flex';
            printOutput(content[currentLang].welcome);
            input.focus();
        }

        document.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const val = input.value.toLowerCase().trim();
                if (!val) return;
                const match = Object.keys(cmdMap).find(c => c.startsWith(val));
                if (match) input.value = match;
            }
            if (e.key === 'Enter') {
                const fullCmd = input.value.toLowerCase().trim();
                printOutput(`<span class="prompt">atakan@production:~$</span> <span style="color:white">${fullCmd}</span>`, true);
                if (fullCmd === 'clear') { history.innerHTML = ''; }
                else if (fullCmd === 'en') { currentLang = 'en'; header.innerText = content['en'].header; printOutput(content['en'].lang_switched); }
                else if (fullCmd === 'tr') { currentLang = 'tr'; header.innerText = content['tr'].header; printOutput("Dil 'Türkçe' olarak değiştirildi."); }
                else if (fullCmd === 'linkedin') { window.open(linkedin_url, '_blank'); }
                else {
                    const logicalCmd = cmdMap[fullCmd];
                    if (logicalCmd && content[currentLang][logicalCmd]) { printOutput(content[currentLang][logicalCmd]); }
                    else if (fullCmd !== "") { printOutput(content[currentLang].error); }
                }
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function printOutput(text, isCommand = false) {
            const resp = document.createElement('div');
            resp.className = 'output';
            isCommand ? resp.innerHTML = text : resp.textContent = text;
            history.appendChild(resp);
        }

        runBootSequence();
    </script>
</body>
</html>
