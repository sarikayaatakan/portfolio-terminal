<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atakan Sarıkaya | Terminal Portfolio</title>
<link rel="icon" href="Tux.png" type="image/png">

<!-- CSP -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);
color:#00ff41;
font-family:Consolas,monospace;
padding:20px;min-height:100vh
}
#terminal{
max-width:1100px;margin:40px auto;background:#0d0d0d;
border-radius:12px;border:1px solid rgba(0,255,65,.2);
overflow:hidden
}
.terminal-header{
background:#1e1e1e;padding:12px 20px;display:flex;align-items:center
}
.terminal-title{flex:1;text-align:center;color:#888;font-size:13px}
.terminal-body{
padding:30px;max-height:80vh;overflow-y:auto
}
.prompt{color:#00aaff;font-weight:bold}
.prompt-path{color:#ffcc00}
.command-input{
background:transparent;border:none;color:#fff;font-family:inherit;
font-size:15px;outline:none;width:70%;margin-left:6px
}
.output{margin-bottom:12px;white-space:pre-wrap;color:#d1d1d1}
.input-line{
display:flex;align-items:center;margin-top:10px;
position:sticky;bottom:0;background:#0d0d0d
}
.dir{color:#00aaff;font-weight:bold;margin-right:15px}
.file{color:#aaa;margin-right:15px}
.error{color:#ff5f57}
</style>
</head>

<body>
<div id="terminal">
  <div class="terminal-header">
    <div class="terminal-title">atakan@devops-portfolio: ~</div>
  </div>
  <div class="terminal-body" id="terminal-body">
    <div id="history"></div>
    <div class="input-line">
      <span class="prompt">atakan@production</span>
      <span class="prompt-path">:~</span><span class="prompt">$</span>
      <input id="input" class="command-input" autofocus autocomplete="off">
    </div>
  </div>
</div>

<script>
const input=document.getElementById("input");
const history=document.getElementById("history");
const body=document.getElementById("terminal-body");

const fs={
home:{dirs:["skills"],files:["README.md"],content:{
"README.md":"Atakan Sarıkaya\\nDevOps & Cloud Infrastructure Specialist\\n\\nType: ls, cd skills, cat README.md"
}},
skills:{dirs:[],files:["skills.txt"],content:{
"skills.txt":"Linux, RHEL, CentOS, Docker, OpenShift, Prometheus, Grafana, Bash"
}}
};

let path="home";

function scrollBottom(){body.scrollTop=body.scrollHeight}

function printPrompt(cmd=""){
const p=document.createElement("div");
p.className="output";
p.innerHTML=`<span class="prompt">atakan@production</span><span class="prompt-path">:${path==="home"?"~":"~/"+path}</span>$ ${cmd}`;
history.appendChild(p);
}

function printOut(txt){const o=document.createElement("div");o.className="output";o.textContent=txt;history.appendChild(o)}

function run(cmd){
const [c,...rest]=cmd.split(" ");
const arg=rest.join(" ");
if(c==="ls"){
let out="";
fs[path].dirs.forEach(d=>out+=d+"/ ");
fs[path].files.forEach(f=>out+=f+" ");
printOut(out);
}
else if(c==="cd"){
if(!arg||arg==="..")path="home";
else if(fs[path].dirs.includes(arg))path=arg;
else printOut("No such directory");
}
else if(c==="cat"){
if(fs[path].content[arg])printOut(fs[path].content[arg]);
else printOut("No such file");
}
else if(c==="clear"){history.innerHTML="";}
else printOut("command not found");
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
const v=input.value.trim();
printPrompt(v);
if(v)run(v);
input.value="";
scrollBottom();
}
});

/* ============================
   KAYNAK KOD GÖRÜNTÜLEMEYİ ZORLAŞTIRMA
   ============================ */

// Sağ tık kapat
document.addEventListener("contextmenu",e=>e.preventDefault());

// Kısayol engelleme
document.addEventListener("keydown",e=>{
const k=e.key.toLowerCase();
if(e.key==="F12")e.preventDefault();
if(e.ctrlKey&&(k==="u"||k==="s"))e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&(k==="i"||k==="j"||k==="c"))e.preventDefault();
},true);

// DevTools açık mı (yaklaşık tespit)
(function(){
const t=160;
function chk(){
if(window.outerWidth-window.innerWidth>t||window.outerHeight-window.innerHeight>t){
document.body.innerHTML="<pre style='color:white;padding:30px'>DevTools detected</pre>";
}
requestAnimationFrame(chk);
}
chk();
})();
</script>
</body>
</html>
