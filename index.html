      gap: 8px;

    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #28ca42; }

    .terminal-title {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      padding: 30px;
      min-height: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: #1a1a1a; }
    .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .prompt { color: #00aaff; font-weight: bold; }
    .prompt-path { color: #ffcc00; font-weight: normal; }

    .command-input {
      background: transparent;
      border: none;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      width: 70%;
      caret-color: #00ff41;
      margin-left: 8px;
    }

    .output {
      margin-bottom: 15px;
      white-space: pre-wrap;
      color: #d1d1d1;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-line { display: none; align-items: center; margin-top: 10px; }

    .error { color: #ff5f57; }
    .dir { color: #00aaff; font-weight: bold; margin-right: 15px; }
    .file { color: #aaa; margin-right: 15px; }

    .section-header {

      font-weight: bold;

      padding-bottom: 5px;

      border-left: 3px solid #00aaff;
      padding: 15px;
      margin: 15px 0;
      border-radius: 4px;
    }

    .loading {

      #terminal { margin: 20px auto; }

    function scrollToBottom() {

    async function typeWriter(element, text, speed = 30) {
      for (let i = 0; i < text.length; i++) {
        element.textContent += text.charAt(i);
        await new Promise(resolve => setTimeout(resolve, speed));
      }
    }

    function isMobile() {
      // basit + güvenli bir mobile tespiti
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.matchMedia("(max-width: 768px)").matches;
    }

    function startGreenLoading(message, durationMs, doneCb) {
      const id = `ld_${Date.now()}_${Math.floor(Math.random()*1000)}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML = `<span class="loading" id="${id}">${message}</span>`;
      history.appendChild(resp);
      scrollToBottom();

      const el = document.getElementById(id);
      let dots = 0;
      const t = setInterval(() => {
        dots = (dots + 1) % 4;
        if (el) el.textContent = message + '.'.repeat(dots);
      }, 180);

      setTimeout(() => {
        clearInterval(t);
        if (el) el.textContent = message + " ✓";
        scrollToBottom();
        if (typeof doneCb === "function") doneCb();
      }, durationMs);
    }

    }

    document.addEventListener('click', () => input.focus());

    input.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
          input.value = commandHistory[historyIndex];
        }
        return;
      }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          input.value = commandHistory[historyIndex];
        } else if (historyIndex === 0) {
          historyIndex = -1;
          input.value = '';
        }
        return;
      }

      if (e.key === 'Tab') {
        e.preventDefault();
        const words = input.value.trim().split(' ');
        const lastWord = words[words.length - 1].toLowerCase();
        if (!lastWord) return;

        const commands = ['help', 'clear', 'pwd', 'ls', 'cd', 'cat', 'whoami', 'linkedin', 'tree', 'cv', 'open', 'wget'];
        const currentItems = [...fs[currentPath].files, ...fs[currentPath].dirs, 'cv'];
        const allPossible = words.length === 1 ? commands : currentItems;

        const matches = allPossible.filter(item => item.toLowerCase().startsWith(lastWord));

        if (matches.length === 1) {
          words[words.length - 1] = matches[0];
          input.value = words.join(' ');
        } else if (matches.length > 1) {
          printOutput(`\nOlası eşleşmeler: ${matches.join('  ')}`, false);
          printPrompt(input.value);
          scrollToBottom();
        }
        return;
      }

      if (e.key === 'Enter') {
        e.preventDefault();

        const rawInput = input.value.trim();
        if (!rawInput) {
          printPrompt();
          input.value = '';
          scrollToBottom();
          return;
        }

        commandHistory.unshift(rawInput);
        historyIndex = -1;

        const args = rawInput.split(' ');
        const cmd = args[0].toLowerCase();
        const target = args.slice(1).join(' ').trim().toLowerCase();

        printPrompt(rawInput);
        executeCommand(cmd, target);

        input.value = '';
        scrollToBottom();
      }
    });

    function executeCommand(cmd, target) {
      switch(cmd) {
        case 'clear':
          history.innerHTML = '';
          break;

        case 'help':
          printOutput(
            `<div class="section-header">Komutlar</div>
<span class="highlight">Gezinme:</span>
  ls               - Dizin içeriğini listeler
  cd [dir]         - Dizine geçiş (cd .. veya cd ~ ile geri)
  pwd              - Bulunduğun dizini gösterir
  tree             - Klasör yapısını gösterir

<span class="highlight">Dosya:</span>
  cat [file]       - Dosya içeriğini gösterir
  cat cv           - CV komutları

<span class="highlight">CV:</span>
  open cv          - CV'yi görüntüle
  wget cv          - CV'yi indir (mobilde görüntüler)
  cv               - yardım
  cv view          - görüntüle
  cv download      - indir

<span class="highlight">Bilgi:</span>
  whoami           - Kısa profil
  linkedin         - LinkedIn profilini açar

<span class="highlight">Sistem:</span>
  clear            - Ekranı temizler
  help             - Bu mesaj`,
            true
          );
          break;

        case 'pwd':
          printOutput(currentPath === 'home' ? '/home/atakan' : `/home/atakan/${currentPath}`);
          break;

        case 'ls': {
          let output = '';
          if (fs[currentPath].dirs.length > 0) {
            fs[currentPath].dirs.forEach(d => output += `<span class="dir">${d}/</span>`);
            output += '\n';
          }
          if (fs[currentPath].files.length > 0) {
            fs[currentPath].files.forEach(f => output += `<span class="file">${f}</span>`);
          }
          printOutput(output, true);
          break;
        }

        case 'tree': {
          let tree = '<span class="highlight">/home/atakan</span>\n';
          fs['home'].dirs.forEach(d => tree += `├── <span class="dir">${d}/</span>\n`);
          fs['home'].files.forEach(f => tree += `├── ${f}\n`);
          printOutput(tree, true);
          break;
        }

        case 'cd':
          if (!target || target === '~' || target === '..') {
            currentPath = 'home';
          } else if (fs[currentPath].dirs.includes(target)) {
            currentPath = target;
          } else {
            printOutput(`<span class="error">bash: cd: ${target}: Böyle bir dizin yok</span>`, true);
          }
          updatePrompt();
          break;

        case 'cat':
          // cat cv özel davranış
          if (target === 'cv') {
            printOutput(cvHelpText(), false);
            break;
          }
          if (fs[currentPath].content && fs[currentPath].content[target]) {
            printOutput(fs[currentPath].content[target], false);
          } else {
            printOutput(`<span class="error">bash: cat: ${target}: Böyle bir dosya yok</span>`, true);
          }
          break;

        case 'whoami':
          printOutput(
            `<div class="info-box">${profile.name} — ${profile.role}
Türk Telekom (Sekom A.Ş.) | ${profile.location}

🎯 DevOps Engineer rollerine açık
• İzleme: Prometheus / Grafana / Alertmanager
• Container: Docker / OpenShift
• Linux: RHEL / CentOS
• Otomasyon: Bash (Python temel)

Detay: 'cat hakkimda.txt'</div>`,
            true
          );
          break;

        case 'linkedin':
          printOutput('LinkedIn profili açılıyor...', false);
          window.open(profile.linkedin, '_blank');
          break;

        // ---- CV komutları (profesyonel dokunuş) ----
        case 'open':
          if (target === 'cv') {
            cvOpen();
          } else {
            printOutput(`<span class="error">Kullanım: open cv</span>`, true);
          }
          break;

        case 'wget':
          if (target === 'cv') {
            if (isMobile()) {
              printOutput("Mobil cihaz tespit edildi. İndirmek yerine CV görüntüleniyor...", false);
              cvOpen();
            } else {
              startGreenLoading("CV indiriliyor", 700, () => {
                cvDownloadDesktop();
              });
            }
          } else {
            printOutput(`<span class="error">Kullanım: wget cv</span>`, true);
          }
          break;

        case 'cv':
          if (!target) {
            printOutput(cvHelpText(), false);
            break;
          }
          if (target === 'view') {
            cvOpen();
            break;
          }
          if (target === 'download') {
            if (isMobile()) {
              printOutput("Mobil cihaz tespit edildi. İndirmek yerine CV görüntüleniyor...", false);
              cvOpen();
            } else {
              startGreenLoading("CV indiriliyor", 700, () => cvDownloadDesktop());
            }
            break;
          }
          printOutput(`<span class="error">Kullanım: cv | cv view | cv download</span>`, true);
          break;

        default:
          if (cmd !== '') {
            printOutput(
              `<span class="error">bash: ${cmd}: komut bulunamadı</span>
Komutlar için 'help' yaz.`,
              true
            );
          }
      }
    }

    function printPrompt(command = '') {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      const resp = document.createElement('div');
      resp.className = 'output';
      resp.innerHTML =
        `<span class="prompt">atakan@production</span>` +
        `<span class="prompt-path">:${path}</span>` +
        `<span class="prompt">$</span> ` +
        `<span style="color:white">${escapeHtml(command)}</span>`;
      history.appendChild(resp);
    }

    function printOutput(text, isHTML = false) {
      const resp = document.createElement('div');
      resp.className = 'output';
      if (isHTML) resp.innerHTML = text;
      else resp.textContent = text;
      history.appendChild(resp);
    }

    function updatePrompt() {
      const path = currentPath === 'home' ? '~' : `~/${currentPath}`;
      promptPath.textContent = `:${path}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // ==========================
    // SADECE "KAYNAK KODU GÖRÜNTÜLEMEYİ ZORLAŞTIRMA"
    // (bypass edilebilir)
    // ==========================
    document.addEventListener('contextmenu', (e) => e.preventDefault(), { passive: false });

    document.addEventListener('keydown', (e) => {
      const k = (e.key || '').toLowerCase();
      const ctrl = e.ctrlKey || e.metaKey;

      if (e.key === 'F12') { e.preventDefault(); e.stopPropagation(); return; }
      if (ctrl && (k === 'u' || k === 's')) { e.preventDefault(); e.stopPropagation(); return; }
      if (ctrl && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); e.stopPropagation(); return; }
    }, true);

    (function devtoolsTrap(){
      const threshold = 160;
      let tripped = false;

      function check() {
        const w = window.outerWidth - window.innerWidth;
        const h = window.outerHeight - window.innerHeight;

        if (!tripped && (w > threshold || h > threshold)) {
          tripped = true;
          printOutput(`<span class="error">[SECURITY] DevTools tespit edildi. Lütfen geliştirici araçlarını kapatın.</span>`, true);
          scrollToBottom();
        }
        requestAnimationFrame(check);
      }
      requestAnimationFrame(check);
    })();

    showIntro();
  </script>
</body>
