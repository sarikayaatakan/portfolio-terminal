<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atakan Sarıkaya | Terminal CV</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; padding: 20px; line-height: 1.6; }
        #terminal { max-width: 950px; }
        .prompt { color: #0087ff; }
        .command-input { background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: inherit; outline: none; width: 70%; }
        .header { color: #ffcc00; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .output { margin-bottom: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="terminal">
        <div class="header">*** ATAKAN SARIKAYA | APP OPS & SYSTEM CONSOLE V1.3 ***</div>
        <div id="history">
            <div class="output">Sistem hazır. Manuel deployment kayıtları yüklendi. 'help' yazın.</div>
        </div>
        <div class="input-line">
            <span class="prompt">atakan@devops:~$</span>
            <input type="text" id="command-input" class="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');

        const commands = {
            'help': "Komutlar: whoami, experience, deployment_ops, skills, clear",
            'whoami': "Atakan Sarıkaya | 27 Yaşında\nElement Management Systems / Application Operation Specialist @ Turk Telekom",
            'experience': `1. Turk Telekom: EMS / Application Operation Specialist
2. Sekom: Software Support Specialist (DevSecOps Cloud Operations)`,
            'deployment_ops': `[Container Operations]
- RedHat OpenShift: Manuel image deployment ve pod yönetimi.
- Docker: Uygulama deployment ve operasyonel yönetim.
[Java & Linux Systems]
- Java Web Apps: ROOT (WAR/JAR) dosyalarının deployment süreçleri.
- Service Management: Linux systemctl (systemd) üzerinden Java servis yönetimi.`,
            'skills': `[System Admin] Linux (RHEL, CentOS), Systemd, Log Monitoring
[Monitoring] Prometheus, Grafana
[Container] RedHat OpenShift, Docker`,
            'clear': ""
        };

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase().trim();
                const output = document.createElement('div');
                output.innerHTML = `<span class="prompt">atakan@devops:~$</span> <span style="color:white">${cmd}</span>`;
                history.appendChild(output);

                if (cmd === 'clear') {
                    history.innerHTML = '';
                } else if (commands[cmd]) {
                    const response = document.createElement('div');
                    response.className = 'output';
                    response.textContent = commands[cmd];
                    history.appendChild(response);
                } else {
                    const error = document.createElement('div');
                    error.textContent = `-bash: ${cmd}: command not found.`;
                    history.appendChild(error);
                }
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });
    </script>
</body>
</html>
