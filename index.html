<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atakan Sarıkaya | DevOps / Cloud & Linux System Specialist</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff41; font-family: 'Consolas', 'Courier New', monospace; padding: 30px; line-height: 1.5; cursor: text; user-select: none; }
        #terminal { max-width: 1000px; margin: auto; }
        .prompt { color: #00aaff; }
        .command-input { background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: inherit; outline: none; width: 60%; caret-color: #00ff41; }
        .header { color: #ffcc00; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; display: none; }
        .output { margin-bottom: 12px; white-space: pre-wrap; color: #d1d1d1; }
        .input-line { display: none; }
        .boot-log { color: #888; margin-bottom: 2px; font-size: 13px; font-family: 'Courier New', Courier, monospace; }
        .ok { color: #00ff41; font-weight: bold; }
        .dir { color: #00aaff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="boot-container"></div>
        <div class="header" id="terminal-header">*** ATAKAN_SARIKAYA_OS [Versiyon 3.3] - THE VISIONARY ***</div>
        <div id="history"></div>
        <div class="input-line" id="input-area">
            <span class="prompt" id="prompt-label">atakan@production:~$</span>
            <input type="text" id="command-input" class="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const header = document.getElementById('terminal-header');
        const inputArea = document.getElementById('input-area');
        const bootContainer = document.getElementById('boot-container');
        const promptLabel = document.getElementById('prompt-label');
        
        let currentPath = 'home';
        const linkedin_url = "https://www.linkedin.com/in/atakansarikaya/";

        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.onkeydown = (e) => { 
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; 
        };

        const fs = {
            'home': {
                dirs: ['sertifikalar', 'tecrube', 'beceriler'],
                files: ['ozgecmis.txt', 'iletisim.sh'],
                content: {
                    'ozgecmis.txt': "Atakan Sarıkaya | 27\n\nDevOps, Cloud ve Linux alanlarında derinleşerek sistem mimarilerini optimize etmeyi \nve modern altyapılar inşa etmeyi hedefliyorum. Şu anda Türk Telekom bünyesinde \nUygulama Operasyon Uzmanı olarak bu vizyonu hayata geçiriyorum.",
                    'iletisim.sh': "https://www.linkedin.com/in/atakansarikaya/"
                }
            },
            'sertifikalar': {
                dirs: [],
                files: ['hccda.txt', 'rh124.txt', 'btk_sql.txt'],
                content: {
                    'hccda.txt': "Huawei Cloud Certified Associate (HCCDA) - Tech Essentials",
                    'rh124.txt': "RedHat Linux System Administration (RH124)",
                    'btk_sql.txt': "Uygulamalarla SQL - BTK Akademi"
                }
            },
            'tecrube': {
                dirs: [],
                files: ['turk_telekom.txt', 'sekom.txt'],
                content: {
                    'turk_telekom.txt': "Türk Telekom (via Sekom): Uygulama Operasyon Uzmanı (6 Ay - Güncel)",
                    'sekom.txt': "Sekom: Yazılım Destek Uzmanı / DevSecOps Cloud Operations (1 Yıl 3 Ay)"
                }
            },
            'beceriler': {
                dirs: [],
                files: ['sistem.txt', 'orchestration.txt', 'monitoring.txt'],
                content: {
                    'sistem.txt': "Linux (RHEL, CentOS), Systemd, Bash Scripting, Web Service Management",
                    'orchestration.txt': "Docker & RedHat OpenShift Orchestration",
                    'monitoring.txt': "Prometheus, Grafana, Log Analysis, Alarm Tracking"
                }
            }
        };

        const bootMessages = [
            "[  0.000000] Linux version 5.14.0-70.13.1.el9_0.x86_64",
            "[  OK  ] Loading Atakan's Profile...",
            "[  OK  ] Mounting /home/atakan/vision...",
            "[  OK  ] System Ready. Initializing Welcome Banner...",
            "Welcome, Atakan Sarıkaya. Shell initialized."
        ];

        async function runBootSequence() {
            for (let msg of bootMessages) {
                const log = document.createElement('div');
                log.className = 'boot-log';
                log.innerHTML = msg.replace("[ OK ]", "<span class='ok'>[ OK ]</span>");
                bootContainer.appendChild(log);
                await new Promise(r => setTimeout(r, 60));
            }
            bootContainer.style.display = 'none';
            header.style.display = 'block';
            inputArea.style.display = 'flex';
            
            // ANA SAYFA ÖZETİ VE NAVİGASYON REHBERİ
            printOutput("Atakan Sarıkaya Terminal OS [v3.3]");
            printOutput("----------------------------------");
            printOutput("DevOps, Cloud ve Linux alanlarında kendimi geliştirmeye ve modern sistemler");
            printOutput("yönetmeye odaklanmış bir Uygulama Operasyon Uzmanıyım.");
            printOutput("\n* Özgeçmişim için: cat ozgecmis.txt (veya 'tecrube/' dizinine girin)");
            printOutput("* Becerilerim için: cd beceriler (ardından 'ls' yapın)");
            printOutput("\nYardım için 'yardim' yazabilirsiniz.");
            
            input.focus();
        }

        document.addEventListener('click', () => input.focus());

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const currentVal = input.value.toLowerCase().trim().split(' ').pop();
                if (!currentVal) return;
                const commands = ['yardim', 'help', 'clear', 'pwd', 'ls', 'cd', 'cat', 'linkedin'];
                const allPossible = [...commands, ...fs[currentPath].files, ...fs[currentPath].dirs];
                const match = allPossible.find(c => c.startsWith(currentVal));
                if (match) {
                    const words = input.value.split(' ');
                    words[words.length - 1] = match;
                    input.value = words.join(' ');
                }
            }
            if (e.key === 'Enter') {
                const rawInput = input.value.trim();
                const args = rawInput.split(' ');
                const cmd = args[0].toLowerCase();
                const target = args[1];

                printOutput(`<span class="prompt">atakan@production:${currentPath === 'home' ? '~' : '~/' + currentPath}$</span> <span style="color:white">${rawInput}</span>`, true);

                if (cmd === 'clear') { history.innerHTML = ''; }
                else if (cmd === 'yardim' || cmd === 'help') { printOutput("Komutlar: ls, cd, cat, pwd, clear, linkedin"); }
                else if (cmd === 'pwd') { printOutput(currentPath === 'home' ? "/home/atakan" : "/home/atakan/" + currentPath); }
                else if (cmd === 'ls') {
                    let output = "";
                    fs[currentPath].dirs.forEach(d => output += `<span class="dir">${d}/</span>  `);
                    fs[currentPath].files.forEach(f => output += `<span>${f}</span>  `);
                    printOutput(output, true);
                } else if (cmd === 'cd') {
                    if (!target || target === '~' || (target === '..' && currentPath !== 'home')) { currentPath = 'home'; }
                    else if (fs[currentPath].dirs.includes(target)) { currentPath = target; }
                    else { printOutput(`-bash: cd: ${target}: Dizin bulunamadı.`); }
                    promptLabel.innerText = `atakan@production:${currentPath === 'home' ? '~' : '~/' + currentPath}$`;
                } else if (cmd === 'cat') {
                    if (fs[currentPath].content && fs[currentPath].content[target]) {
                        printOutput(fs[currentPath].content[target]);
                        if (target === 'iletisim.sh') window.open(linkedin_url, '_blank');
                    } else { printOutput(`-bash: cat: ${target || ''}: Dosya bulunamadı.`); }
                } else if (cmd === 'linkedin') { window.open(linkedin_url, '_blank'); }
                else if (cmd !== "") { printOutput(`-bash: ${cmd}: komut bulunamadı.`); }

                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function printOutput(text, isHTML = false) {
            const resp = document.createElement('div');
            resp.className = 'output';
            isHTML ? resp.innerHTML = text : resp.textContent = text;
            history.appendChild(resp);
        }

        runBootSequence();
    </script>
</body>
</html>
